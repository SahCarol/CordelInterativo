<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cordel Interativo - Zé Violeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Special Elite', cursive;
            background: #1a0f0a;
            background-image: 
                radial-gradient(ellipse at 20% 50%, #3d251a 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, #3d251a 0%, transparent 60%),
                linear-gradient(180deg, #1a0f0a 0%, #2c1810 50%, #1a0f0a 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cordel-box {
            background: #f5e6c8;
            background-image: linear-gradient(180deg, #faf0dc 0%, #f5e6c8 50%, #ede0c8 100%);
            border: 12px solid #5c3d2e;
            border-image: repeating-linear-gradient(45deg, #5c3d2e 0px, #5c3d2e 8px, #7a5240 8px, #7a5240 16px) 12;
            box-shadow: 20px 20px 0 0 rgba(44, 24, 16, 0.7), inset 0 0 60px rgba(92, 61, 46, 0.15);
            border-radius: 2px;
            max-width: 1000px;
            width: 100%;
            padding: 35px 45px;
            margin: 20px auto;
            position: relative;
        }

        .cordel-box::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(139, 90, 43, 0.04) 3px, rgba(139, 90, 43, 0.04) 6px),
                repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(139, 90, 43, 0.02) 3px, rgba(139, 90, 43, 0.02) 6px);
            pointer-events: none;
            border-radius: 1px;
        }

        .cordel-box::after {
            content: '';
            position: absolute;
            top: -8px;
            left: 10%;
            right: 10%;
            height: 4px;
            background: repeating-linear-gradient(90deg, #8B7355 0px, #8B7355 10px, transparent 10px, transparent 20px);
            border-radius: 2px;
            opacity: 0.6;
        }

        .cordel-title {
            font-family: 'Special Elite', cursive;
            color: #2c1810;
            text-shadow: 3px 3px 0 rgba(139, 90, 43, 0.3), 5px 5px 0 rgba(139, 90, 43, 0.1);
            letter-spacing: 3px;
            border-bottom: 3px double #8B7355;
            padding-bottom: 18px;
            position: relative;
        }

        .cordel-text {
            font-family: 'Special Elite', cursive;
            color: #2c1810;
            line-height: 2.4;
            font-size: 1.15rem;
            white-space: pre-wrap;
            padding: 25px 20px;
            background: rgba(255, 248, 235, 0.6);
            border-left: 4px solid #8B7355;
            border-right: 4px solid #8B7355;
            border-radius: 8px;
            position: relative;
            min-height: 200px;
            margin: 20px 0;
            box-shadow: inset 0 0 30px rgba(139, 90, 43, 0.05);
        }

        .cordel-text strong {
            color: #7a2e1a;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 1px 2px rgba(122, 46, 26, 0.2);
        }

        .action-button {
            font-family: 'Special Elite', cursive;
            background: #5c3d2e;
            color: #f5e6c8;
            border: 3px solid #3d251a;
            padding: 14px 20px;
            border-radius: 4px;
            transition: all 0.15s ease;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
            box-shadow: 5px 5px 0 0 #3d251a, inset 0 -4px 0 0 #3d251a;
            font-size: 1rem;
            letter-spacing: 0.5px;
            width: 100%;
            cursor: pointer;
            text-align: center;
            line-height: 1.4;
        }

        .action-button:hover:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0 0 #3d251a, inset 0 -4px 0 0 #3d251a;
            background: #7a5240;
        }

        .action-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0 0 #3d251a;
        }

        .action-button.secondary {
            background: #8B7355;
            border-color: #5c3d2e;
            box-shadow: 5px 5px 0 0 #5c3d2e, inset 0 -4px 0 0 #5c3d2e;
            font-size: 1.1rem;
            padding: 16px 28px;
            width: auto;
            min-width: 250px;
        }

        .action-button.secondary:hover:not(:disabled) {
            background: #a08464;
        }

        .action-button strong {
            color: #f5d742;
            font-weight: bold;
        }

        .xilogravura {
            font-size: 2.2rem;
            color: #5c3d2e;
            opacity: 0.25;
            letter-spacing: 12px;
            user-select: none;
        }

        .caminho {
            color: #8B7355;
            font-size: 0.85rem;
            text-align: center;
            margin: 5px 0 15px 0;
            padding: 8px;
            background: rgba(139, 90, 43, 0.08);
            border-radius: 20px;
            border: 1px dashed #8B7355;
        }

        .final-tag {
            display: inline-block;
            background: #5c3d2e;
            color: #f5d742;
            padding: 4px 18px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
            border: 2px solid #3d251a;
        }

        @media (max-width: 768px) {
            .cordel-box { padding: 20px 18px; border-width: 8px; }
            .cordel-text { font-size: 0.95rem; line-height: 2; padding: 18px 12px; min-height: 150px; }
            .action-button { font-size: 0.85rem; padding: 10px 14px; }
            .cordel-title { font-size: 2rem !important; }
            .xilogravura { font-size: 1.5rem; letter-spacing: 8px; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div class="cordel-box">
        <div class="text-center mb-6">
            <div class="xilogravura">✦ ✦ ✦</div>
            <h1 class="cordel-title text-4xl md:text-5xl font-bold text-red-900 mt-2">
                O Cordel Interativo
            </h1>
            <p class="text-lg text-amber-900/80 mt-3 italic">
                Zé Violeiro convida: leia e decida o destino de João!
            </p>
            <div class="xilogravura mt-2">✦ ✦ ✦</div>
        </div>

        <div id="caminho" class="caminho">🌵 Início da jornada</div>
        <div id="texto" class="cordel-text"></div>

        <div id="botoes" class="grid grid-cols-1 md:grid-cols-2 gap-3 w-full mt-4"></div>
        
        <div class="flex justify-center mt-6">
            <button id="reiniciar" class="action-button secondary hidden" onclick="inicio()">
                ↺ Recomeçar Jornada
            </button>
        </div>

        <div class="mt-8 pt-4 border-t-2 border-amber-800/30 text-center">
            <p class="text-sm text-amber-900/70">
                <span class="font-bold">Zé Violeiro:</span> Alto, magro, e com seu inseparável chapéu de palha.
            </p>
            <div class="xilogravura mt-1 text-xs">✧ ✧ ✧</div>
        </div>
    </div>

    <script>
        // ===== ELEMENTOS =====
        const textoEl = document.getElementById('texto');
        const botoesEl = document.getElementById('botoes');
        const reiniciarEl = document.getElementById('reiniciar');
        const caminhoEl = document.getElementById('caminho');
        let processando = false;
        let historico = [];

        // ===== NEGRITO =====
        function negrito(t) {
            return t.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
        }

        // ===== EXIBIR =====
        function exibir(texto, opcoes, final = false) {
            if (processando) return;
            processando = true;

            textoEl.classList.remove('fade-in');
            textoEl.innerHTML = negrito(texto);
            botoesEl.innerHTML = '';
            reiniciarEl.classList.add('hidden');

            void textoEl.offsetWidth;
            textoEl.classList.add('fade-in');

            if (opcoes && opcoes.length > 0) {
                opcoes.forEach((op, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'action-button fade-in';
                    btn.innerHTML = negrito(op.texto);
                    btn.style.animationDelay = (i * 0.1) + 's';
                    btn.onclick = () => {
                        if (processando) return;
                        document.querySelectorAll('#botoes button').forEach(b => b.disabled = true);
                        op.acao(op.valor);
                    };
                    botoesEl.appendChild(btn);
                });
            }

            if (final) {
                setTimeout(() => {
                    reiniciarEl.classList.remove('hidden');
                }, 300);
            }

            setTimeout(() => { processando = false; }, 100);
        }

        // ===== ADICIONAR AO CAMINHO =====
        function addCaminho(passo) {
            historico.push(passo);
            caminhoEl.textContent = '📜 ' + historico.join(' → ');
        }

        // ============================================================
        // HISTÓRIA - ESTRUTURA NOVA
        // ============================================================

        // PASSO 1: INÍCIO
        function inicio() {
            historico = [];
            caminhoEl.textContent = '🌵 Nova jornada começa';
            
            exibir(
                `"Sou Zé Violeiro, vim contar uma história,
                De João, um valente que busca sua glória.
                Ele partiu do sertão com seu facão na mão,
                Em busca de aventura, em busca de emoção.

                Três caminhos se abrem diante de João:
                O *Sertão* seco, a *Caatinga* ou o *Litoral*.
                Escolha com cuidado, pois o destino é seu,
                E a história de João será o que você quiser!"`,
                [
                    { valor: 'sertao', texto: '🏜️ *Sertão* - Terra de sol e poeira', acao: passo2 },
                    { valor: 'caatinga', texto: '🌵 *Caatinga* - Mata de espinhos', acao: passo2 },
                    { valor: 'litoral', texto: '🌊 *Litoral* - Praias e mar azul', acao: passo2 }
                ]
            );
        }

        // PASSO 2: CENÁRIOS
        function passo2(valor) {
            const nomes = { sertao: 'Sertão', caatinga: 'Caatinga', litoral: 'Litoral' };
            addCaminho(nomes[valor]);

            if (valor === 'sertao') {
                exibir(
                    `"No *Sertão* o sol castiga, a terra é rachada,
                    João caminha cansado, a sede é chegada.
                    Ele avista uma *caravana* ao longe,
                    E também uma *gruta* escura, um grande horror.

                    O que João faz? Qual caminho ele escolhe?
                    A caravana ou a gruta misteriosa?"`,
                    [
                        { valor: 'caravana', texto: '🐪 Seguir a *caravana*', acao: passo3Sertao },
                        { valor: 'gruta', texto: '🕯️ Entrar na *gruta*', acao: passo3Sertao }
                    ]
                );
            } else if (valor === 'caatinga') {
                exibir(
                    `"Na *Caatinga* os espinhos ferem, o vento é cortante,
                    João encontra uma *cabana* de uma rezadeira,
                    E também uma *cobra* gigante na estrada,
                    Pronta para atacar qualquer aventureiro.

                    João precisa decidir seu caminho:
                    A cabana da rezadeira ou a cobra?"`,
                    [
                        { valor: 'cabana', texto: '🏠 Entrar na *cabana*', acao: passo3Caatinga },
                        { valor: 'cobra', texto: '🐍 Enfrentar a *cobra*', acao: passo3Caatinga }
                    ]
                );
            } else {
                exibir(
                    `"No *Litoral* a brisa é suave, o mar é azul,
                    João encontra um *pescador* com seu barco,
                    E também uma *moça* bonita na areia,
                    Que parece querer lhe contar um segredo.

                    João precisa escolher seu destino:
                    O pescador ou a moça misteriosa?"`,
                    [
                        { valor: 'pescador', texto: '⛵ Ir com o *pescador*', acao: passo3Litoral },
                        { valor: 'moca', texto: '🏖️ Ficar com a *moça*', acao: passo3Litoral }
                    ]
                );
            }
        }

        // PASSO 3: AÇÕES SERTÃO (4 finais)
        function passo3Sertao(valor) {
            addCaminho(valor === 'caravana' ? 'Caravana' : 'Gruta');

            if (valor === 'caravana') {
                exibir(
                    `"João seguiu a caravana pelo sertão,
                    Aprendeu a negociar, virou um *mercador*.
                    Enriqueceu, mas nunca esqueceu sua terra,
                    Construiu uma escola e um poço para o povo.

                    João se tornou um *herói* do sertão,
                    Respeitado por todos, com grande coração.
                    Sua história é de *superação* e de amor,
                    Um final feliz para o nosso andador!"`,
                    [],
                    true
                );
            } else {
                exibir(
                    `"João entrou na gruta escura e sombria,
                    Encontrou um *tesouro* que ninguém sabia.
                    Mas a gruta era de um *feiticeiro* malvado,
                    Que prendeu João num feitiço dourado.

                    João usou sua esperteza para escapar,
                    Mas o tesouro o fez um homem ganancioso.
                    Perdeu a simplicidade, perdeu a humildade,
                    E seu final foi triste, de muita vaidade!"`,
                    [],
                    true
                );
            }
        }

        // PASSO 3: AÇÕES CAATINGA (4 finais)
        function passo3Caatinga(valor) {
            addCaminho(valor === 'cabana' ? 'Cabana' : 'Cobra');

            if (valor === 'cabana') {
                exibir(
                    `"João entrou na cabana da rezadeira,
                    Ela lhe ensinou os segredos da floresta.
                    João virou um *curandeiro* famoso,
                    Curando os doentes com ervas e rezas.

                    Mas a inveja dos outros o perseguiu,
                    E João teve que partir, deixando seu lar.
                    Virou um andarilho, um sábio viajante,
                    Curando por onde passava, um verdadeiro amante!"`,
                    [],
                    true
                );
            } else {
                exibir(
                    `"João enfrentou a cobra gigante com bravura,
                    Lutou com seu facão, com muita coragem.
                    Matou a cobra, mas foi picado no pé,
                    Quase morreu, mas sobreviveu com fé.

                    Aprendeu que *violência* não é a solução,
                    Ficou manco, mas ganhou uma lição.
                    Sua história serve de alerta para todos,
                    Que a *sabedoria* vence os maiores odores!"`,
                    [],
                    true
                );
            }
        }

        // PASSO 3: AÇÕES LITORAL (4 finais)
        function passo3Litoral(valor) {
            addCaminho(valor === 'pescador' ? 'Pescador' : 'Moça');

            if (valor === 'pescador') {
                exibir(
                    `"João foi com o pescador para o alto-mar,
                    Enfrentaram tempestades, aprenderam a pescar.
                    João virou um *pescador* experiente,
                    Mas sentia falta do sertão, da terra quente.

                    Um dia, uma *sereia* o encantou com seu canto,
                    E João ficou entre o mar e a terra, num encanto.
                    Viveu entre dois mundos, sem nunca encontrar,
                    A paz que tanto buscava, no seu caminhar!"`,
                    [],
                    true
                );
            } else {
                exibir(
                    `"João ficou com a moça na beira da praia,
                    Ela era uma *princesa* disfarçada em trajes de araia.
                    Casaram-se e viveram num castelo à beira-mar,
                    João virou *rei* de uma terra, sem precisar lutar.

                    Mas a vida de rei não era o que sonhou,
                    E João percebeu que o *amor verdadeiro* o transformou.
                    Governou com justiça e com compaixão,
                    E seu nome virou lenda em toda a nação!"`,
                    [],
                    true
                );
            }
        }

        // ============================================================
        // INICIAR
        // ============================================================
        window.onload = inicio;
    </script>
</body>
</html>
