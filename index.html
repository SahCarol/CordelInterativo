<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cordel Interativo - Zé Violeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

        body {
            font-family: 'Special Elite', cursive;
            background: #1a0f0a;
            background-image: 
                radial-gradient(ellipse at 20% 50%, #3d251a 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, #3d251a 0%, transparent 60%),
                linear-gradient(180deg, #1a0f0a 0%, #2c1810 50%, #1a0f0a 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .cordel-box {
            background: #f5e6c8;
            background-image: linear-gradient(180deg, #faf0dc 0%, #f5e6c8 50%, #ede0c8 100%);
            border: 12px solid #5c3d2e;
            border-image: repeating-linear-gradient(45deg, #5c3d2e 0px, #5c3d2e 8px, #7a5240 8px, #7a5240 16px) 12;
            box-shadow: 20px 20px 0 0 rgba(44, 24, 16, 0.7), inset 0 0 60px rgba(92, 61, 46, 0.15);
            border-radius: 2px;
            max-width: 920px;
            width: 100%;
            position: relative;
            padding: 35px 45px;
            margin: 20px auto;
        }

        .cordel-box::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(139, 90, 43, 0.04) 3px, rgba(139, 90, 43, 0.04) 6px),
                repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(139, 90, 43, 0.02) 3px, rgba(139, 90, 43, 0.02) 6px);
            pointer-events: none;
            border-radius: 1px;
        }

        .cordel-box::after {
            content: '';
            position: absolute;
            top: -8px;
            left: 10%;
            right: 10%;
            height: 4px;
            background: repeating-linear-gradient(90deg, #8B7355 0px, #8B7355 10px, transparent 10px, transparent 20px);
            border-radius: 2px;
            opacity: 0.6;
        }

        .cordel-title {
            font-family: 'Special Elite', cursive;
            color: #2c1810;
            text-shadow: 3px 3px 0 rgba(139, 90, 43, 0.3), 5px 5px 0 rgba(139, 90, 43, 0.1);
            letter-spacing: 3px;
            border-bottom: 3px double #8B7355;
            padding-bottom: 18px;
            position: relative;
        }

        .cordel-title::before {
            content: '✦';
            position: absolute;
            left: -25px;
            top: 50%;
            transform: translateY(-50%);
            color: #8B7355;
            font-size: 1.5rem;
            opacity: 0.4;
        }

        .cordel-title::after {
            content: '✦';
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            color: #8B7355;
            font-size: 1.5rem;
            opacity: 0.4;
        }

        .cordel-text {
            font-family: 'Special Elite', cursive;
            color: #2c1810;
            line-height: 2.4;
            font-size: 1.2rem;
            white-space: pre-wrap;
            padding: 25px 20px;
            background: rgba(255, 248, 235, 0.6);
            border-left: 4px solid #8B7355;
            border-right: 4px solid #8B7355;
            border-radius: 8px;
            position: relative;
            min-height: 220px;
            margin: 20px 0;
            box-shadow: inset 0 0 30px rgba(139, 90, 43, 0.05);
        }

        .cordel-text::before {
            content: '❧';
            position: absolute;
            top: -12px;
            left: 15px;
            font-size: 1.8rem;
            color: #8B7355;
            opacity: 0.4;
            background: #f5e6c8;
            padding: 0 8px;
        }

        .cordel-text::after {
            content: '❧';
            position: absolute;
            bottom: -12px;
            right: 15px;
            font-size: 1.8rem;
            color: #8B7355;
            opacity: 0.4;
            transform: rotate(180deg);
            background: #f5e6c8;
            padding: 0 8px;
        }

        .cordel-text strong {
            color: #7a2e1a;
            font-weight: bold;
            font-size: 1.25rem;
            text-shadow: 0 1px 2px rgba(122, 46, 26, 0.2);
        }

        .action-button {
            font-family: 'Special Elite', cursive;
            background: #5c3d2e;
            color: #f5e6c8;
            border: 3px solid #3d251a;
            padding: 14px 28px;
            border-radius: 4px;
            transition: all 0.15s ease;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
            box-shadow: 5px 5px 0 0 #3d251a, inset 0 -4px 0 0 #3d251a;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            width: 100%;
            cursor: pointer;
            text-align: center;
            line-height: 1.4;
        }

        .action-button:hover:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0 0 #3d251a, inset 0 -4px 0 0 #3d251a;
            background: #7a5240;
        }

        .action-button:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 1px 1px 0 0 #3d251a, inset 0 -4px 0 0 #3d251a;
        }

        .action-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0 0 #3d251a;
        }

        .action-button.secondary {
            background: #8B7355;
            border-color: #5c3d2e;
            box-shadow: 5px 5px 0 0 #5c3d2e, inset 0 -4px 0 0 #5c3d2e;
        }

        .action-button.secondary:hover:not(:disabled) {
            background: #a08464;
        }

        .action-button strong {
            color: #f5d742;
            font-weight: bold;
        }

        .xilogravura {
            font-size: 2.2rem;
            color: #5c3d2e;
            opacity: 0.25;
            letter-spacing: 12px;
            user-select: none;
            font-family: 'Special Elite', cursive;
        }

        .final-badge {
            display: inline-block;
            background: #5c3d2e;
            color: #f5e6c8;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .cordel-box { padding: 20px 18px; border-width: 8px; }
            .cordel-text { font-size: 1rem; line-height: 2; padding: 18px 12px; min-height: 160px; }
            .action-button { font-size: 0.95rem; padding: 12px 18px; }
            .cordel-title { font-size: 2rem !important; }
            .cordel-title::before, .cordel-title::after { display: none; }
            .xilogravura { font-size: 1.5rem; letter-spacing: 8px; }
        }

        @media (max-width: 480px) {
            .cordel-box { padding: 15px 12px; }
            .cordel-text { font-size: 0.9rem; line-height: 1.8; padding: 12px 8px; min-height: 120px; }
            .action-button { font-size: 0.85rem; padding: 10px 14px; box-shadow: 3px 3px 0 0 #3d251a; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div class="cordel-box">
        <div class="text-center mb-6">
            <div class="xilogravura">✦ ✦ ✦</div>
            <h1 class="cordel-title text-4xl md:text-5xl font-bold text-red-900 mt-2">
                O Cordel Interativo
            </h1>
            <p class="text-lg text-amber-900/80 mt-3 italic">
                Zé Violeiro convida: leia e decida o destino!
            </p>
            <div class="xilogravura mt-2">✦ ✦ ✦</div>
        </div>

        <div id="text-display" class="cordel-text"></div>

        <div id="interaction-area" class="flex flex-col items-center space-y-4">
            <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full"></div>
            <button id="restart-button" class="hidden action-button secondary mt-4" onclick="startStory()">
                ↺ Começar Outra História!
            </button>
        </div>

        <div class="mt-8 pt-4 border-t-2 border-amber-800/30 text-center">
            <p class="text-sm text-amber-900/70">
                <span class="font-bold">Zé Violeiro:</span> Alto, magro, e com seu inseparável chapéu de palha.
            </p>
            <div class="xilogravura mt-1 text-xs">✧ ✧ ✧</div>
        </div>
    </div>

    <script>
        // ===== ELEMENTOS DOM =====
        const textDisplay = document.getElementById('text-display');
        const optionsContainer = document.getElementById('options-container');
        const restartButton = document.getElementById('restart-button');
        let isProcessing = false;

        // ===== FUNÇÃO PARA NEGRITO =====
        function formatText(text) {
            return text.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
        }

        // ===== EXIBIR TEXTO =====
        function displayCordel(text, showRestart = false) {
            if (isProcessing) return;
            isProcessing = true;

            textDisplay.classList.remove('fade-in');
            textDisplay.innerHTML = formatText(text);
            optionsContainer.innerHTML = '';
            restartButton.classList.add('hidden');
            
            void textDisplay.offsetWidth;
            textDisplay.classList.add('fade-in');

            if (showRestart) {
                setTimeout(() => {
                    restartButton.classList.remove('hidden');
                }, 300);
            }

            setTimeout(() => { isProcessing = false; }, 100);
        }

        // ===== RENDERIZAR BOTÕES =====
        function renderOptions(options) {
            optionsContainer.innerHTML = '';
            restartButton.classList.add('hidden');
            
            options.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerHTML = formatText(option.text);
                button.className = 'action-button fade-in';
                button.style.animationDelay = `${index * 0.1}s`;
                button.onclick = () => {
                    if (isProcessing) return;
                    Array.from(optionsContainer.querySelectorAll('button')).forEach(btn => btn.disabled = true);
                    option.callback(option.value);
                };
                optionsContainer.appendChild(button);
            });
        }

        // ===== HISTÓRIA COMPLETA COM MAIS OPÇÕES =====
        
        // 1. INÍCIO - Escolha do Cenário
        window.startStory = function() {
            if (isProcessing) return;
            
            const text = `
        "Sou eu, Zé Violeiro, cheguei pra prosear,
        Pego a viola, afinada, pra a história começar.
        Esse é o Cordel de João, cabra forte e destemido,
        Que vai enfrentar o mundo sem nunca ter tido medo.

        Alto, magro, de chapéu, um matuto viajante,
        João procura a sorte, faz-se um cacto errante.
        Mas todo herói da vida tem que ter um começo,
        Um lugar pra dar o passo, pra sair do seu recesso.
        
        Diga cá, meu companheiro, onde a história vai brotar?
        No *Sertão* seco, na *Caatinga* ou na *Cidade*?"
            `;

            displayCordel(text);
            
            const options = [
                { text: "🌵 No *Sertão* rachado e poeirento", value: "sertao", callback: chooseSetting },
                { text: "🌿 Na *Caatinga* de pedras e espinhos", value: "caatinga", callback: chooseSetting },
                { text: "🏙️ Na *Cidade* grande e movimentada", value: "cidade", callback: chooseSetting }
            ];
            
            setTimeout(() => renderOptions(options), 100);
        };

        // 2. CENÁRIO - Escolha do Desafio
        function chooseSetting(setting) {
            if (isProcessing) return;
            
            let text, options;

            if (setting === 'sertao') {
                text = `
        "O Sertão foi escolhido, lugar de sol de rachar,
        João caminha na caieira, sem poder água encontrar.
        Quando o sol batia forte, na areia que fervia,
        Nosso herói viu algo estranho que o caminho lhe trazia.

        Era o *BANDO DE LAMPIÃO*, com rifles e com facão,
        Querendo fazer assalto pra tocar o terror no chão!
        
        Mas também ouviu falar de uma *FONTE ESCONDIDA*,
        Que dá água e vida nova, uma benção concedida.
        
        E agora, o que faz João? Diante da dura afronta?
        Enfrenta os cangaceiros ou busca a fonte?"
                `;
                options = [
                    { text: "⚔️ *Enfrenta* os cangaceiros com coragem", value: "enfrentar", callback: chooseActionSertao },
                    { text: "💧 *Busca* a fonte escondida no sertão", value: "fonte", callback: chooseActionSertao },
                    { text: "🌙 *Espera* a noite cair pra passar despercebido", value: "esperar", callback: chooseActionSertao }
                ];
            } else if (setting === 'caatinga') {
                text = `
        "Na Caatinga, o cenário de espinho e juazeiro,
        João seguia sua trilha, como um cabra verdadeiro.
        Ele busca um Mandacaru, pra beber água e viver,
        Quando um UIVO de assombro faz seu corpo estremecer.

        Na sombra de um Xique-Xique, surgiu a *ASSOMBRAÇÃO*,
        Um vulto branco e gigante, a BIXA-SETE-CABEÇAS do sertão.
        
        Mas também encontrou uma *VELHA SÁBIA*,
        Que lhe ofereceu um amuleto pra se proteger.
        
        E agora, o que faz João? Diante da assombração?
        Enfrenta o monstro ou aceita o amuleto?"
                `;
                options = [
                    { text: "🗡️ *Enfrenta* a assombração com bravura", value: "lutar", callback: chooseActionCaatinga },
                    { text: "🔮 *Aceita* o amuleto da velha sábia", value: "amuleto", callback: chooseActionCaatinga },
                    { text: "💨 *Corre* sem olhar pra trás, na velocidade do vento", value: "correr", callback: chooseActionCaatinga }
                ];
            } else {
                text = `
        "Na Cidade grande e movimentada, João se viu perdido,
        Entre carros, gente e prédios, um mundo desconhecido.
        Deixou o sertão pra trás, buscando uma nova sorte,
        Mas encontrou perigos bem piores que a morte.

        Foi abordado por um *MALANDRO* que queria enganá-lo,
        E uma *MOÇA BONITA* que parecia ajudá-lo.
        
        E agora, o que faz João? Nessa selva de pedra?
        Confia no malandro ou na moça?"
                `;
                options = [
                    { text: "🎭 *Confia* no malandro da cidade", value: "malandro", callback: chooseActionCidade },
                    { text: "💃 *Confia* na moça bonita e gentil", value: "moca", callback: chooseActionCidade },
                    { text: "🚶 *Segue* sozinho, desconfiando de todos", value: "sozinho", callback: chooseActionCidade }
                ];
            }

            displayCordel(text);
            setTimeout(() => renderOptions(options), 100);
        }

        // 3. AÇÕES - SERTÃO (3 finais)
        function chooseActionSertao(action) {
            if (isProcessing) return;
            
            let text;

            switch (action) {
                case 'enfrentar':
                    text = `
        "João enfrentou os cangaceiros com seu facão na mão,
        Gritou alto e mostrou que tinha muita disposição!
        Mas eram muitos contra um, e a luta foi cruel,
        João saiu ferido, mas mostrou que era fiel.

        O bando se espalhou, com medo da coragem,
        E João sobreviveu, virando uma *LENDA* na viagem.
        
        🏆 *FINAL HERÓICO*: João virou um cangaceiro respeitado,
        E sua história no sertão é sempre celebrada!"
                    `;
                    break;
                case 'fonte':
                    text = `
        "João buscou a fonte escondida, seguindo o vento,
        Encontrou água cristalina, um verdadeiro alento.
        Bebeu e se fortaleceu, com uma nova energia,
        E decidiu compartilhar com quem dele precisaria.

        Construiu uma comunidade ao redor da água,
        Virou um *LÍDER* respeitado, acabando com a mágoa.
        
        🏆 *FINAL PRÓSPERO*: João fundou uma cidade no sertão,
        E viveu em paz, com água e muita união!"
                    `;
                    break;
                case 'esperar':
                    text = `
        "João esperou a noite cair, feito bicho-do-mato,
        Observou os cangaceiros e evitou o desbarato.
        Quando a lua se escondeu, ele seguiu seu caminho,
        Mais sábio e cauteloso, um cabra muito fininho.

        Aprendeu que a *PACIÊNCIA* é a maior virtude,
        E viveu muitos anos, com saúde e juventude.
        
        🏆 *FINAL SÁBIO*: João viveu até os cem anos,
        Contando histórias de suas aventuras e enganos!"
                    `;
                    break;
                default:
                    return;
            }

            displayCordel(text, true);
        }

        // 3. AÇÕES - CAATINGA (3 finais)
        function chooseActionCaatinga(action) {
            if (isProcessing) return;
            
            let text;

            switch (action) {
                case 'lutar':
                    text = `
        "João sacou o seu facão e investiu contra o vulto,
        Fez a fé e não temeu, não se dobrou ao insulto!
        Mas a Bicha-Sete-Cabeças é feita de puro vento,
        O facão não pegou em nada, e João sofreu o tormento.

        Mas ele não desistiu, usou sua *INTELIGÊNCIA*,
        Atirou sal e farinha, quebrando a resistência.
        
        🏆 *FINAL VITORIOSO*: João derrotou a assombração,
        E virou protetor da caatinga, com muita gratidão!"
                    `;
                    break;
                case 'amuleto':
                    text = `
        "João aceitou o amuleto da velha sábia,
        Um colar de osso e penas, que o deixava hábil.
        A assombração sumiu, com medo da proteção,
        E João seguiu em paz, com o coração em ação.

        Ele aprendeu que a *SABEDORIA* dos antigos,
        É um tesouro maior que todo ouro antigo.
        
        🏆 *FINAL MÍSTICO*: João virou um curandeiro famoso,
        Curando os males do sertão, um homem generoso!"
                    `;
                    break;
                case 'correr':
                    text = `
        "João correu pelo mato, mais veloz que um raio,
        A Bicha-Sete-Cabeças não podia segui-lo em maio.
        Ele usou a sua *MALÍCIA*, o instinto de sobrevivente,
        Deixou a assombração pra trás, e seguiu, contente.

        Mas o medo o ensinou a ser mais cuidadoso,
        E nunca mais andou sozinho, ficou mais precavido.
        
        🏆 *FINAL SOBREVIVENTE*: João escapou do perigo,
        Viveu uma vida longa, mas sempre com um amigo!"
                    `;
                    break;
                default:
                    return;
            }

            displayCordel(text, true);
        }

        // 3. AÇÕES - CIDADE (3 finais)
        function chooseActionCidade(action) {
            if (isProcessing) return;
            
            let text;

            switch (action) {
                case 'malandro':
                    text = `
        "João confiou no malandro, que era um grande trapaceiro,
        Roubou suas economias, deixando-o sem dinheiro.
        Mas João aprendeu a *SER ESPERTO* na cidade,
        E com trabalho duro, recuperou sua dignidade.

        Virou um comerciante honesto e respeitado,
        E nunca mais foi enganado, ficou mais ligado!
        
        🏆 *FINAL ESPERTO*: João aprendeu com o erro,
        E construiu um império, com muito esforço e acerto!"
                    `;
                    break;
                case 'moca':
                    text = `
        "João confiou na moça bonita, que era um anjo na terra,
        Ela o ajudou com trabalho, comida e até com uma cama.
        João se apaixonou, e juntos construíram uma vida,
        Uma família feliz, uma história comprida.

        A *AMOR* verdadeiro encontrou no caminho,
        E João viveu feliz, com sua moça e seus filhinhos.
        
        🏆 *FINAL ROMÂNTICO*: João casou com a moça gentil,
        E tiveram muitos filhos, no melhor estilo cordel!"
                    `;
                    break;
                case 'sozinho':
                    text = `
        "João seguiu sozinho, desconfiado de todos,
        Trabalhou muito, juntou dinheiro aos poucos.
        Mas a *SOLIDÃO* apertou seu coração,
        Percebeu que dinheiro não traz felicidade em ação.

        Voltou pro sertão, onde a vida é mais simples,
        E lá encontrou a paz, longe dos arranha-céus.
        
        🏆 *FINAL REFLEXIVO*: João voltou para suas origens,
        E viveu em paz, com a simplicidade das coisas!"
                    `;
                    break;
                default:
                    return;
            }

            displayCordel(text, true);
        }

        // ===== INICIALIZAÇÃO =====
        window.onload = startStory;
    </script>
</body>
</html>
