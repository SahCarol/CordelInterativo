<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cordel Interativo - Zé Violeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

        body {
            font-family: 'Special Elite', cursive;
            background: #2c1810;
            background-image: 
                radial-gradient(ellipse at 20% 50%, #4a2a1a 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, #4a2a1a 0%, transparent 60%),
                linear-gradient(180deg, #1a0f0a 0%, #2c1810 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Moldura de xilogravura */
        .cordel-box {
            background: #f5e6c8;
            background-image: 
                linear-gradient(0deg, rgba(245, 230, 200, 0.9) 0%, rgba(255, 248, 225, 0.95) 100%);
            border: 8px solid #5c3d2e;
            border-image: repeating-linear-gradient(
                45deg,
                #5c3d2e 0px,
                #5c3d2e 10px,
                #7a5240 10px,
                #7a5240 20px
            ) 8;
            box-shadow: 
                15px 15px 0 0 rgba(44, 24, 16, 0.6),
                inset 0 0 30px rgba(92, 61, 46, 0.2);
            border-radius: 4px;
            max-width: 900px;
            position: relative;
            padding: 30px 40px;
        }

        /* Efeito de papel envelhecido com textura */
        .cordel-box::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(139, 90, 43, 0.03) 2px,
                    rgba(139, 90, 43, 0.03) 4px
                );
            pointer-events: none;
            border-radius: 2px;
        }

        /* Decoração de cordel (barbante) */
        .cordel-box::after {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 4px;
            background: repeating-linear-gradient(
                90deg,
                #8B7355 0px,
                #8B7355 8px,
                transparent 8px,
                transparent 16px
            );
            border-radius: 2px;
        }

        .cordel-title {
            font-family: 'Special Elite', cursive;
            color: #2c1810;
            text-shadow: 
                2px 2px 0 rgba(139, 90, 43, 0.3),
                4px 4px 0 rgba(139, 90, 43, 0.1);
            letter-spacing: 2px;
            border-bottom: 3px double #8B7355;
            padding-bottom: 15px;
        }

        .cordel-text {
            font-family: 'Special Elite', cursive;
            color: #2c1810;
            line-height: 2.2;
            font-size: 1.2rem;
            white-space: pre-wrap;
            padding: 20px 10px;
            background: rgba(255, 248, 225, 0.5);
            border-left: 4px solid #8B7355;
            border-right: 4px solid #8B7355;
            border-radius: 8px;
            position: relative;
            min-height: 200px;
        }

        /* Efeito de texto impresso */
        .cordel-text::before {
            content: '❧';
            position: absolute;
            top: -10px;
            left: 10px;
            font-size: 1.5rem;
            color: #8B7355;
            opacity: 0.5;
        }

        .cordel-text::after {
            content: '❧';
            position: absolute;
            bottom: -10px;
            right: 10px;
            font-size: 1.5rem;
            color: #8B7355;
            opacity: 0.5;
            transform: rotate(180deg);
        }

        .action-button {
            font-family: 'Special Elite', cursive;
            background: #5c3d2e;
            color: #f5e6c8;
            border: 3px solid #3d251a;
            padding: 12px 24px;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
            box-shadow: 
                4px 4px 0 0 #3d251a,
                inset 0 -4px 0 0 #3d251a;
            position: relative;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .action-button:hover {
            transform: translate(2px, 2px);
            box-shadow: 
                2px 2px 0 0 #3d251a,
                inset 0 -4px 0 0 #3d251a;
            background: #7a5240;
        }

        .action-button:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0 0 #3d251a;
        }

        .action-button.secondary {
            background: #8B7355;
            border-color: #5c3d2e;
            box-shadow: 
                4px 4px 0 0 #5c3d2e,
                inset 0 -4px 0 0 #5c3d2e;
        }

        .action-button.secondary:hover {
            background: #a08464;
        }

        /* Spinner estilizado */
        .loader {
            border: 4px solid #f5e6c8;
            border-top: 4px solid #5c3d2e;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 10px rgba(92, 61, 46, 0.3);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Estilo para xilogravura decorativa */
        .xilogravura {
            font-size: 2rem;
            color: #5c3d2e;
            opacity: 0.3;
            letter-spacing: 10px;
            user-select: none;
        }

        /* Estilo do player de áudio */
        .cordel-audio {
            background: #f5e6c8;
            border: 2px solid #5c3d2e;
            border-radius: 4px;
            padding: 8px;
            width: 100%;
            margin-top: 20px;
        }

        .cordel-audio::-webkit-media-controls-panel {
            background: #f5e6c8;
        }

        /* Efeito de digitando */
        @keyframes cursor-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .typing-cursor::after {
            content: '|';
            animation: cursor-blink 1s step-end infinite;
            color: #5c3d2e;
        }

        /* Responsividade */
        @media (max-width: 640px) {
            .cordel-box {
                padding: 20px 15px;
            }
            .cordel-text {
                font-size: 1rem;
                line-height: 1.8;
                padding: 15px 8px;
            }
            .action-button {
                font-size: 0.95rem;
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="flex items-start justify-center min-h-screen py-8">
        <div class="cordel-box w-full">
            <!-- Cabeçalho com xilogravura -->
            <div class="text-center mb-6">
                <div class="xilogravura">✦ ✦ ✦</div>
                <h1 class="cordel-title text-4xl md:text-5xl font-bold text-red-900">
                    O Cordel Interativo
                </h1>
                <p class="text-lg text-amber-900/80 mt-2 italic">
                    Zé Violeiro convida: escute, leia e decida o destino!
                </p>
                <div class="xilogravura mt-2">✦ ✦ ✦</div>
            </div>

            <!-- Área de Exibição do Texto -->
            <div id="text-display" class="cordel-text mb-8">
                <!-- Texto inserido pelo JavaScript -->
            </div>

            <!-- Área de Interação -->
            <div id="interaction-area" class="flex flex-col items-center space-y-4">
                
                <!-- Indicador de Carregamento -->
                <div id="loading-indicator" class="hidden flex items-center justify-center space-x-3 text-amber-900">
                    <div class="loader"></div>
                    <span class="text-lg">Zé Violeiro está afinando a viola...</span>
                </div>

                <!-- Botões de Opções -->
                <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                    <!-- Injetado pelo JavaScript -->
                </div>
                
                <!-- Botão de Recomeço -->
                <button id="restart-button" onclick="startStory()" class="hidden mt-6 action-button secondary">
                    ↺ Começar Outra História!
                </button>
            </div>

            <!-- Player de Áudio -->
            <audio id="cordel-audio" controls class="cordel-audio hidden"></audio>

            <!-- Rodapé -->
            <div class="mt-8 pt-4 border-t-2 border-amber-800/30 text-center">
                <p class="text-sm text-amber-900/70">
                    <span class="font-bold">Zé Violeiro:</span> Alto, magro, e com seu inseparável chapéu de palha.
                </p>
                <div class="xilogravura mt-1 text-xs">✧ ✧ ✧</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        
        const apiKey = "";
        const TTS_MODEL = "gemini-2.5-flash-preview-tts";
        const TTS_API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${TTS_MODEL}:generateContent?key=${apiKey}`;

        const textDisplay = document.getElementById('text-display');
        const optionsContainer = document.getElementById('options-container');
        const loadingIndicator = document.getElementById('loading-indicator');
        const restartButton = document.getElementById('restart-button');
        const cordelAudio = document.getElementById('cordel-audio');

        let storyState = 0;
        let isProcessing = false;

        // --- UTILIDADES DE ÁUDIO ---
        const base64ToArrayBuffer = (base64) => {
            const binaryString = atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        };

        const pcmToWav = (pcm16, sampleRate) => {
            const numChannels = 1;
            const bytesPerSample = 2;
            const blockAlign = numChannels * bytesPerSample;
            const byteRate = sampleRate * blockAlign;
            const dataSize = pcm16.byteLength;
            const fileSize = 44 + dataSize;
            
            const buffer = new ArrayBuffer(fileSize);
            const view = new DataView(buffer);
            
            let offset = 0;
            
            const writeString = (view, offset, str) => {
                for (let i = 0; i < str.length; i++) {
                    view.setUint8(offset + i, str.charCodeAt(i));
                }
            };
            
            writeString(view, offset, 'RIFF'); offset += 4;
            view.setUint32(offset, fileSize - 8, true); offset += 4;
            writeString(view, offset, 'WAVE'); offset += 4;
            
            writeString(view, offset, 'fmt '); offset += 4;
            view.setUint32(offset, 16, true); offset += 4;
            view.setUint16(offset, 1, true); offset += 2;
            view.setUint16(offset, numChannels, true); offset += 2;
            view.setUint32(offset, sampleRate, true); offset += 4;
            view.setUint32(offset, byteRate, true); offset += 4;
            view.setUint16(offset, blockAlign, true); offset += 2;
            view.setUint16(offset, 16, true); offset += 2;
            
            writeString(view, offset, 'data'); offset += 4;
            view.setUint32(offset, dataSize, true); offset += 4;
            
            const dataView = new Uint8Array(buffer, offset);
            dataView.set(new Uint8Array(pcm16.buffer));
            
            return new Blob([buffer], { type: 'audio/wav' });
        };

        // --- TTS ---
        async function fetchTTS(prompt, maxRetries = 3, delay = 1000) {
            const fullPrompt = `Diga em português do Brasil com um sotaque nordestino forte, em um tom alegre e de contador de histórias, com entonação dramática e pausas expressivas: "${prompt}"`;

            const payload = {
                contents: [{ parts: [{ text: fullPrompt }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: {
                            prebuiltVoiceConfig: { voiceName: "Puck" }
                        }
                    }
                },
                model: TTS_MODEL
            };

            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(TTS_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error(`Status: ${response.status}`);

                    const result = await response.json();
                    const part = result?.candidates?.[0]?.content?.parts?.[0];
                    const audioData = part?.inlineData?.data;
                    const mimeType = part?.inlineData?.mimeType;

                    if (audioData && mimeType && mimeType.startsWith("audio/L16;")) {
                        const rateMatch = mimeType.match(/rate=(\d+)/);
                        const sampleRate = rateMatch ? parseInt(rateMatch[1], 10) : 24000;
                        const pcmData = base64ToArrayBuffer(audioData);
                        const pcm16 = new Int16Array(pcmData);
                        const wavBlob = pcmToWav(pcm16, sampleRate);
                        return URL.createObjectURL(wavBlob);
                    }
                    throw new Error("Áudio inválido");
                } catch (error) {
                    if (i < maxRetries - 1) {
                        await new Promise(resolve => setTimeout(resolve, delay));
                        delay *= 2;
                    } else {
                        throw error;
                    }
                }
            }
            return null;
        }

        // --- EXIBIÇÃO ---
        async function displayCordel(text, promptForTTS, showRestart = false) {
            if (isProcessing) return;
            isProcessing = true;

            textDisplay.innerHTML = text;
            optionsContainer.innerHTML = '';
            restartButton.classList.add('hidden');
            loadingIndicator.classList.remove('hidden');
            cordelAudio.classList.add('hidden');
            cordelAudio.pause();
            cordelAudio.src = '';

            try {
                const audioUrl = await fetchTTS(promptForTTS);
                if (audioUrl) {
                    cordelAudio.src = audioUrl;
                    cordelAudio.classList.remove('hidden');
                    
                    // Adiciona evento de fim para mostrar restart
                    if (showRestart) {
                        cordelAudio.addEventListener('ended', () => {
                            restartButton.classList.remove('hidden');
                        }, { once: true });
                    }
                    
                    await cordelAudio.play().catch(e => console.error("Erro no áudio:", e));
                }
            } catch (error) {
                console.error("Erro TTS:", error);
                textDisplay.innerHTML += `<p class="text-red-800 mt-4 font-bold">⚠️ Erro ao carregar o áudio. Tente novamente.</p>`;
            } finally {
                loadingIndicator.classList.add('hidden');
                if (!showRestart) {
                    restartButton.classList.add('hidden');
                }
                isProcessing = false;
            }
        }

        // --- RENDERIZAÇÃO DE OPÇÕES ---
        function renderOptions(options) {
            optionsContainer.innerHTML = '';
            restartButton.classList.add('hidden');
            
            options.forEach(option => {
                const button = document.createElement('button');
                button.innerHTML = option.text;
                button.className = 'action-button w-full';
                button.onclick = () => {
                    if (isProcessing) return;
                    Array.from(optionsContainer.querySelectorAll('button')).forEach(btn => btn.disabled = true);
                    option.callback(option.value);
                };
                optionsContainer.appendChild(button);
            });
        }

        // --- HISTÓRIA ---
        
        // 1. INÍCIO
        window.startStory = function() {
            if (isProcessing) return;
            
            const text = `
                "Sou eu, Zé Violeiro, cheguei pra prosear,
                Pego a viola, afinada, pra a história começar.
                Esse é o Cordel de João, cabra forte e destemido,
                Que vai enfrentar o mundo sem nunca ter tido medo.

                Alto, magro, de chapéu, um matuto viajante,
                João procura a sorte, faz-se um cacto errante.
                Mas todo herói da vida tem que ter um começo,
                Um lugar pra dar o passo, pra sair do seu recesso.
                
                Diga cá, meu companheiro, onde a história vai brotar?
                No campo seco e rachado ou no rio a beira-mar?"
            `;
            
            const promptForTTS = `Sou eu, Zé Violeiro, cheguei pra prosear. Pego a viola, afinada, pra a história começar. Esse é o Cordel de João, cabra forte e destemido, que vai enfrentar o mundo sem nunca ter tido medo. Alto, magro, de chapéu, um matuto viajante, João procura a sorte, faz-se um cacto errante. Mas todo herói da vida tem que ter um começo, um lugar pra dar o passo, pra sair do seu recesso. Diga cá, meu companheiro, onde a história vai brotar? No campo seco e rachado ou no rio a beira-mar?`;

            displayCordel(text, promptForTTS, false).then(() => {
                const options = [
                    { text: "🌵 No *Sertão* rachado e poeirento", value: "sertao", callback: chooseSetting },
                    { text: "🌿 Na *Caatinga* de pedras e espinhos", value: "caatinga", callback: chooseSetting }
                ];
                renderOptions(options);
            });
        };

        // 2. CENÁRIO
        function chooseSetting(setting) {
            if (isProcessing) return;
            
            let text, promptForTTS, options;

            if (setting === 'sertao') {
                text = `
                    "O Sertão foi escolhido, lugar de sol de rachar,
                    João caminha na caieira, sem poder água encontrar.
                    Quando o sol batia forte, na areia que fervia,
                    Nosso herói viu algo estranho que o caminho lhe trazia.

                    Um clarão lá na vereda, um mistério a reluzir,
                    João sabia: era perigo, mas resolveu prosseguir.
                    Era o BANDO DE LAMPIÃO, com rifles e com facão,
                    Querendo fazer assalto pra tocar o terror no chão!
                    
                    E agora, o que faz João? Diante da dura afronta?
                    Vai pro mato ou saca a arma? O que a sua alma conta?"
                `;
                promptForTTS = `O Sertão foi escolhido, lugar de sol de rachar. João caminha na caieira, sem poder água encontrar. Quando o sol batia forte, na areia que fervia, nosso herói viu algo estranho que o caminho lhe trazia. Um clarão lá na vereda, um mistério a reluzir, João sabia: era perigo, mas resolveu prosseguir. Era o BANDO DE LAMPIÃO, com rifles e com facão, querendo fazer assalto pra tocar o terror no chão! E agora, o que faz João? Diante da dura afronta? Vai pro mato ou saca a arma? O que a sua alma conta?`;
                options = [
                    { text: "🌿 *Se esconde* na moita e espera a noite", value: "esconder", callback: chooseAction },
                    { text: "⚔️ *Grita* e atira sua pedra no bandido", value: "atirar", callback: chooseAction }
                ];
            } else {
                text = `
                    "Na Caatinga, o cenário de espinho e juazeiro,
                    João seguia sua trilha, como um cabra verdadeiro.
                    Ele busca um Mandacaru, pra beber água e viver,
                    Quando um UIVO de assombro faz seu corpo estremecer.

                    Na sombra de um Xique-Xique, surgiu a *Assombração*,
                    Um vulto branco e gigante, a BIXA-SETE-CABEÇAS do sertão.
                    O medo cortou o vento, paralisando o valente,
                    Pois lutar com o invisível não é coisa pra toda gente.
                    
                    E agora, o que faz João? Diante da dura afronta?
                    Vai pro mato ou saca a arma? O que a sua alma conta?"
                `;
                promptForTTS = `Na Caatinga, o cenário de espinho e juazeiro. João seguia sua trilha, como um cabra verdadeiro. Ele busca um Mandacaru, pra beber água e viver, quando um uivo de assombro faz seu corpo estremecer. Na sombra de um Xique-Xique, surgiu a Assombração, um vulto branco e gigante, a BIXA-SETE-CABEÇAS do sertão. O medo cortou o vento, paralisando o valente, pois lutar com o invisível não é coisa pra toda gente. E agora, o que faz João? Diante da dura afronta? Vai pro mato ou saca a arma? O que a sua alma conta?`;
                options = [
                    { text: "🗡️ *Saca o facão* e enfrenta o medo de frente", value: "lutar", callback: chooseAction },
                    { text: "💨 *Corre* sem olhar pra trás, na velocidade do vento", value: "correr", callback: chooseAction }
                ];
            }

            displayCordel(text, promptForTTS, false).then(() => renderOptions(options));
        }

        // 3. AÇÃO (FINAL)
        function chooseAction(action) {
            if (isProcessing) return;
            
            let text, promptForTTS;

            switch (action) {
                case 'esconder':
                    text = `
                        "João se escondeu na moita, feito bicho-do-mato,
                        Esperou o bando passar, evitando o desbarato.
                        Ele viu rifle e facão, percebeu que era perdido,
                        E a *Esperteza* de João evitou ser ferido.

                        Quando a poeira baixou, ele seguiu seu destino,
                        Agora mais cauteloso, um cabra forte e fino.
                        
                        João viveu e aprendeu, e sua vida é *longa e cheia* de paz.
                        Um final pra um herói que pensa, e não só o que faz!"
                    `;
                    promptForTTS = `João se escondeu na moita, feito bicho-do-mato. Esperou o bando passar, evitando o desbarato. Ele viu rifle e facão, percebeu que era perdido, e a esperteza de João evitou ser ferido. Quando a poeira baixou, ele seguiu seu destino, agora mais cauteloso, um cabra forte e fino. João viveu e aprendeu, e sua vida é longa e cheia de paz. Um final pra um herói que pensa, e não só o que faz!`;
                    break;
                case 'atirar':
                    text = `
                        "João gritou e atirou sua pedra, num ato de coragem,
                        Os bandidos riram alto, e não deram nem passagem.
                        Por ser só um contra um bando, o final foi de lamento,
                        A *Impulsividade* custou-lhe caro, findando o seu momento.
                        
                        O cordel termina aqui, não há mais pra onde ir.
                        O destino de João é *triste e breve*, pois ousou sem medir!"
                    `;
                    promptForTTS = `João gritou e atirou sua pedra, num ato de coragem. Os bandidos riram alto, e não deram nem passagem. Por ser só um contra um bando, o final foi de lamento. A Impulsividade custou-lhe caro, findando o seu momento. O cordel termina aqui, não há mais pra onde ir. O destino de João é triste e breve, pois ousou sem medir!`;
                    break;
                case 'lutar':
                    text = `
                        "João sacou o seu facão e investiu contra o vulto,
                        Fez a fé e não temeu, não se dobrou ao insulto!
                        Mas a Bicha-Sete-Cabeças é feita de puro vento,
                        O facão não pegou em nada, e João sofreu o tormento.

                        O monstro o abraçou forte, sugando-lhe a energia.
                        A *Teimosia* de João foi sua agonia.
                        
                        O cordel termina aqui, com o herói definhando.
                        O destino de João é *triste e breve*, no sertão se acabando!"
                    `;
                    promptForTTS = `João sacou o seu facão e investiu contra o vulto. Fez a fé e não temeu, não se dobrou ao insulto! Mas a Bicha-Sete-Cabeças é feita de puro vento, o facão não pegou em nada, e João sofreu o tormento. O monstro o abraçou forte, sugando-lhe a energia. A Teimosia de João foi sua agonia. O cordel termina aqui, com o herói definhando. O destino de João é triste e breve, no sertão se acabando!`;
                    break;
                case 'correr':
                    text = `
                        "João correu pelo mato, mais veloz que um raio,
                        A Bicha-Sete-Cabeças não podia segui-lo em maio.
                        Ele usou a sua *Malícia*, o instinto de sobrevivente,
                        Deixou a assombração pra trás, e seguiu, contente.
                        
                        Ele escapou do perigo, viveu pra contar a história.
                        E a vida de João é *longa e cheia* de paz e de glória!"
                    `;
