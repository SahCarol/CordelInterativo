<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cordel Interativo - Zé Violeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Special Elite', cursive;
            background: #1a0f0a;
            background-image: 
                radial-gradient(ellipse at 20% 50%, #3d251a 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, #3d251a 0%, transparent 60%),
                linear-gradient(180deg, #1a0f0a 0%, #2c1810 50%, #1a0f0a 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Moldura principal com efeito de xilogravura */
        .cordel-box {
            background: #f5e6c8;
            background-image: 
                linear-gradient(180deg, #faf0dc 0%, #f5e6c8 50%, #ede0c8 100%);
            border: 12px solid #5c3d2e;
            border-image: repeating-linear-gradient(
                45deg,
                #5c3d2e 0px,
                #5c3d2e 8px,
                #7a5240 8px,
                #7a5240 16px
            ) 12;
            box-shadow: 
                20px 20px 0 0 rgba(44, 24, 16, 0.7),
                inset 0 0 60px rgba(92, 61, 46, 0.15);
            border-radius: 2px;
            max-width: 920px;
            width: 100%;
            position: relative;
            padding: 35px 45px;
            margin: 20px auto;
        }

        /* Textura de papel envelhecido */
        .cordel-box::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 3px,
                    rgba(139, 90, 43, 0.04) 3px,
                    rgba(139, 90, 43, 0.04) 6px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 3px,
                    rgba(139, 90, 43, 0.02) 3px,
                    rgba(139, 90, 43, 0.02) 6px
                );
            pointer-events: none;
            border-radius: 1px;
        }

        /* Barbante decorativo */
        .cordel-box::after {
            content: '';
            position: absolute;
            top: -8px;
            left: 10%;
            right: 10%;
            height: 4px;
            background: repeating-linear-gradient(
                90deg,
                #8B7355 0px,
                #8B7355 10px,
                transparent 10px,
                transparent 20px
            );
            border-radius: 2px;
            opacity: 0.6;
        }

        /* Título principal */
        .cordel-title {
            font-family: 'Special Elite', cursive;
            color: #2c1810;
            text-shadow: 
                3px 3px 0 rgba(139, 90, 43, 0.3),
                5px 5px 0 rgba(139, 90, 43, 0.1);
            letter-spacing: 3px;
            border-bottom: 3px double #8B7355;
            padding-bottom: 18px;
            position: relative;
        }

        .cordel-title::before {
            content: '✦';
            position: absolute;
            left: -25px;
            top: 50%;
            transform: translateY(-50%);
            color: #8B7355;
            font-size: 1.5rem;
            opacity: 0.4;
        }

        .cordel-title::after {
            content: '✦';
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            color: #8B7355;
            font-size: 1.5rem;
            opacity: 0.4;
        }

        /* Área de texto do cordel */
        .cordel-text {
            font-family: 'Special Elite', cursive;
            color: #2c1810;
            line-height: 2.4;
            font-size: 1.2rem;
            white-space: pre-wrap;
            padding: 25px 20px;
            background: rgba(255, 248, 235, 0.6);
            border-left: 4px solid #8B7355;
            border-right: 4px solid #8B7355;
            border-radius: 8px;
            position: relative;
            min-height: 220px;
            margin: 20px 0;
            box-shadow: inset 0 0 30px rgba(139, 90, 43, 0.05);
        }

        .cordel-text::before {
            content: '❧';
            position: absolute;
            top: -12px;
            left: 15px;
            font-size: 1.8rem;
            color: #8B7355;
            opacity: 0.4;
            background: #f5e6c8;
            padding: 0 8px;
        }

        .cordel-text::after {
            content: '❧';
            position: absolute;
            bottom: -12px;
            right: 15px;
            font-size: 1.8rem;
            color: #8B7355;
            opacity: 0.4;
            transform: rotate(180deg);
            background: #f5e6c8;
            padding: 0 8px;
        }

        /* Efeito de digitação */
        @keyframes cursor-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .typing-cursor::after {
            content: '|';
            animation: cursor-blink 1s step-end infinite;
            color: #5c3d2e;
        }

        /* Botões estilo xilogravura */
        .action-button {
            font-family: 'Special Elite', cursive;
            background: #5c3d2e;
            color: #f5e6c8;
            border: 3px solid #3d251a;
            padding: 14px 28px;
            border-radius: 4px;
            transition: all 0.15s ease;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
            box-shadow: 
                5px 5px 0 0 #3d251a,
                inset 0 -4px 0 0 #3d251a;
            position: relative;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            width: 100%;
            cursor: pointer;
            text-align: center;
            line-height: 1.4;
        }

        .action-button:hover:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 
                3px 3px 0 0 #3d251a,
                inset 0 -4px 0 0 #3d251a;
            background: #7a5240;
        }

        .action-button:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 
                1px 1px 0 0 #3d251a,
                inset 0 -4px 0 0 #3d251a;
        }

        .action-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0 0 #3d251a;
        }

        .action-button.secondary {
            background: #8B7355;
            border-color: #5c3d2e;
            box-shadow: 
                5px 5px 0 0 #5c3d2e,
                inset 0 -4px 0 0 #5c3d2e;
        }

        .action-button.secondary:hover:not(:disabled) {
            background: #a08464;
        }

        /* Spinner estilizado */
        .loader {
            border: 4px solid #f5e6c8;
            border-top: 4px solid #5c3d2e;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 0.8s linear infinite;
            box-shadow: 0 0 20px rgba(92, 61, 46, 0.2);
            flex-shrink: 0;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Xilogravura decorativa */
        .xilogravura {
            font-size: 2.2rem;
            color: #5c3d2e;
            opacity: 0.25;
            letter-spacing: 12px;
            user-select: none;
            font-family: 'Special Elite', cursive;
        }

        /* Player de áudio estilizado */
        .cordel-audio {
            background: #f5e6c8;
            border: 2px solid #5c3d2e;
            border-radius: 4px;
            padding: 10px;
            width: 100%;
            margin-top: 20px;
            box-shadow: inset 0 2px 8px rgba(92, 61, 46, 0.1);
        }

        .cordel-audio::-webkit-media-controls-panel {
            background: #f5e6c8;
        }

        .cordel-audio::-webkit-media-controls-play-button {
            background: #5c3d2e;
            border-radius: 50%;
            color: #f5e6c8;
        }

        /* Indicador de carregamento */
        #loading-indicator {
            background: rgba(245, 230, 200, 0.9);
            padding: 15px 25px;
            border-radius: 8px;
            border: 2px solid #8B7355;
            box-shadow: 4px 4px 0 0 rgba(92, 61, 46, 0.2);
        }

        #loading-indicator span {
            color: #2c1810;
            font-size: 1.1rem;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .cordel-box {
                padding: 20px 18px;
                border-width: 8px;
            }
            
            .cordel-text {
                font-size: 1rem;
                line-height: 2;
                padding: 18px 12px;
                min-height: 160px;
            }
            
            .action-button {
                font-size: 0.95rem;
                padding: 12px 18px;
            }
            
            .cordel-title {
                font-size: 2rem !important;
            }
            
            .cordel-title::before,
            .cordel-title::after {
                display: none;
            }
            
            .xilogravura {
                font-size: 1.5rem;
                letter-spacing: 8px;
            }
        }

        @media (max-width: 480px) {
            .cordel-box {
                padding: 15px 12px;
            }
            
            .cordel-text {
                font-size: 0.9rem;
                line-height: 1.8;
                padding: 12px 8px;
                min-height: 120px;
            }
            
            .action-button {
                font-size: 0.85rem;
                padding: 10px 14px;
                box-shadow: 3px 3px 0 0 #3d251a;
            }
        }

        /* Animações */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div class="cordel-box">
        <!-- Cabeçalho -->
        <div class="text-center mb-6">
            <div class="xilogravura">✦ ✦ ✦</div>
            <h1 class="cordel-title text-4xl md:text-5xl font-bold text-red-900 mt-2">
                O Cordel Interativo
            </h1>
            <p class="text-lg text-amber-900/80 mt-3 italic">
                Zé Violeiro convida: escute, leia e decida o destino!
            </p>
            <div class="xilogravura mt-2">✦ ✦ ✦</div>
        </div>

        <!-- Área de texto -->
        <div id="text-display" class="cordel-text">
            <!-- Injetado pelo JavaScript -->
        </div>

        <!-- Área de interação -->
        <div id="interaction-area" class="flex flex-col items-center space-y-4">
            
            <!-- Loading -->
            <div id="loading-indicator" class="hidden items-center justify-center space-x-4">
                <div class="loader"></div>
                <span>Zé Violeiro está afinando a viola...</span>
            </div>

            <!-- Opções -->
            <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                <!-- Injetado pelo JavaScript -->
            </div>
            
            <!-- Reiniciar -->
            <button id="restart-button" class="hidden action-button secondary mt-4">
                ↺ Começar Outra História!
            </button>
        </div>

        <!-- Áudio -->
        <audio id="cordel-audio" controls class="cordel-audio hidden"></audio>

        <!-- Rodapé -->
        <div class="mt-8 pt-4 border-t-2 border-amber-800/30 text-center">
            <p class="text-sm text-amber-900/70">
                <span class="font-bold">Zé Violeiro:</span> Alto, magro, e com seu inseparável chapéu de palha.
            </p>
            <div class="xilogravura mt-1 text-xs">✧ ✧ ✧</div>
        </div>
    </div>

    <script type="module">
        // ============================================================
        // IMPORTAÇÕES E CONFIGURAÇÕES
        // ============================================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        
        const apiKey = "";
        const TTS_MODEL = "gemini-2.5-flash-preview-tts";
        const TTS_API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${TTS_MODEL}:generateContent?key=${apiKey}`;

        // ============================================================
        // DOM ELEMENTOS
        // ============================================================
        const textDisplay = document.getElementById('text-display');
        const optionsContainer = document.getElementById('options-container');
        const loadingIndicator = document.getElementById('loading-indicator');
        const restartButton = document.getElementById('restart-button');
        const cordelAudio = document.getElementById('cordel-audio');

        let isProcessing = false;

        // ============================================================
        // UTILIDADES DE ÁUDIO
        // ============================================================
        const base64ToArrayBuffer = (base64) => {
            const binaryString = atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        };

        const pcmToWav = (pcm16, sampleRate) => {
            const numChannels = 1;
            const bytesPerSample = 2;
            const blockAlign = numChannels * bytesPerSample;
            const byteRate = sampleRate * blockAlign;
            const dataSize = pcm16.byteLength;
            const fileSize = 44 + dataSize;
            
            const buffer = new ArrayBuffer(fileSize);
            const view = new DataView(buffer);
            
            let offset = 0;
            
            const writeString = (view, offset, str) => {
                for (let i = 0; i < str.length; i++) {
                    view.setUint8(offset + i, str.charCodeAt(i));
                }
            };
            
            writeString(view, offset, 'RIFF'); offset += 4;
            view.setUint32(offset, fileSize - 8, true); offset += 4;
            writeString(view, offset, 'WAVE'); offset += 4;
            
            writeString(view, offset, 'fmt '); offset += 4;
            view.setUint32(offset, 16, true); offset += 4;
            view.setUint16(offset, 1, true); offset += 2;
            view.setUint16(offset, numChannels, true); offset += 2;
            view.setUint32(offset, sampleRate, true); offset += 4;
            view.setUint32(offset, byteRate, true); offset += 4;
            view.setUint16(offset, blockAlign, true); offset += 2;
            view.setUint16(offset, 16, true); offset += 2;
            
            writeString(view, offset, 'data'); offset += 4;
            view.setUint32(offset, dataSize, true); offset += 4;
            
            const dataView = new Uint8Array(buffer, offset);
            dataView.set(new Uint8Array(pcm16.buffer));
            
            return new Blob([buffer], { type: 'audio/wav' });
        };

        // ============================================================
        // TTS (TEXT-TO-SPEECH)
        // ============================================================
        async function fetchTTS(prompt, maxRetries = 3, delay = 1000) {
            const fullPrompt = `Diga em português do Brasil com um sotaque nordestino forte, 
            em um tom alegre e de contador de histórias, com entonação dramática e pausas expressivas: "${prompt}"`;

            const payload = {
                contents: [{ parts: [{ text: fullPrompt }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: {
                            prebuiltVoiceConfig: { voiceName: "Puck" }
                        }
                    }
                },
                model: TTS_MODEL
            };

            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(TTS_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error(`Status: ${response.status}`);

                    const result = await response.json();
                    const part = result?.candidates?.[0]?.content?.parts?.[0];
                    const audioData = part?.inlineData?.data;
                    const mimeType = part?.inlineData?.mimeType;

                    if (audioData && mimeType && mimeType.startsWith("audio/L16;")) {
                        const rateMatch = mimeType.match(/rate=(\d+)/);
                        const sampleRate = rateMatch ? parseInt(rateMatch[1], 10) : 24000;
                        const pcmData = base64ToArrayBuffer(audioData);
                        const pcm16 = new Int16Array(pcmData);
                        const wavBlob = pcmToWav(pcm16, sampleRate);
                        return URL.createObjectURL(wavBlob);
                    }
                    throw new Error("Áudio inválido");
                } catch (error) {
                    if (i < maxRetries - 1) {
                        await new Promise(resolve => setTimeout(resolve, delay));
                        delay *= 2;
                    } else {
                        throw error;
                    }
                }
            }
            return null;
        }

        // ============================================================
        // EXIBIÇÃO DO CORDEL
        // ============================================================
        async function displayCordel(text, promptForTTS, showRestart = false) {
            if (isProcessing) return;
            isProcessing = true;

            // Aplica animação fade-in
            textDisplay.classList.remove('fade-in');
            textDisplay.innerHTML = text;
            optionsContainer.innerHTML = '';
            restartButton.classList.add('hidden');
            loadingIndicator.classList.remove('hidden');
            loadingIndicator.style.display = 'flex';
            cordelAudio.classList.add('hidden');
            cordelAudio.pause();
            cordelAudio.src = '';
            
            // Força reflow para reiniciar animação
            void textDisplay.offsetWidth;
            textDisplay.classList.add('fade-in');

            try {
                const audioUrl = await fetchTTS(promptForTTS);
                if (audioUrl) {
                    cordelAudio.src = audioUrl;
                    cordelAudio.classList.remove('hidden');
                    
                    if (showRestart) {
                        cordelAudio.addEventListener('ended', () => {
                            restartButton.classList.remove('hidden');
                        }, { once: true });
                    }
                    
                    await cordelAudio.play().catch(e => console.error("Erro no áudio:", e));
                }
            } catch (error) {
                console.error("Erro TTS:", error);
                textDisplay.innerHTML += `
                    <p class="text-red-800 mt-4 font-bold">⚠️ Erro ao carregar o áudio. Tente novamente.</p>
                `;
            } finally {
                loadingIndicator.style.display = 'none';
                if (!showRestart) {
                    restartButton.classList.add('hidden');
                }
                isProcessing = false;
            }
        }

        // ============================================================
        // RENDERIZAÇÃO DE OPÇÕES
        // ============================================================
        function renderOptions(options) {
            optionsContainer.innerHTML = '';
            restartButton.classList.add('hidden');
            
            options.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerHTML = option.text;
                button.className = 'action-button fade-in';
                button.style.animationDelay = `${index * 0.1}s`;
                button.onclick = () => {
                    if (isProcessing) return;
                    Array.from(optionsContainer.querySelectorAll('button')).forEach(btn => btn.disabled = true);
                    option.callback(option.value);
                };
                optionsContainer.appendChild(button);
            });
        }

        // ============================================================
        // LÓGICA DA HISTÓRIA
        // ============================================================
        
        // 1. INÍCIO
        window.startStory = function() {
            if (isProcessing) return;
            
            const text = `
        "Sou eu, Zé Violeiro, cheguei pra prosear,
        Pego a viola, afinada, pra a história começar.
        Esse é o Cordel de João, cabra forte e destemido,
        Que vai enfrentar o mundo sem nunca ter tido medo.

        Alto, magro, de chapéu, um matuto viajante,
        João procura a sorte, faz-se um cacto errante.
        Mas todo herói da vida tem que ter um começo,
        Um lugar pra dar o passo, pra sair do seu recesso.
        
        Diga cá, meu companheiro, onde a história vai brotar?
        No campo seco e rachado ou no rio a beira-mar?"
            `;
            
            const promptForTTS = `Sou eu, Zé Violeiro, cheguei pra prosear. Pego a viola, afinada, pra a história começar. Esse é o Cordel de João, cabra forte e destemido, que vai enfrentar o mundo sem nunca ter tido medo. Alto, magro, de chapéu, um matuto viajante, João procura a sorte, faz-se um cacto errante. Mas todo herói da vida tem que ter um começo, um lugar pra dar o passo, pra sair do seu recesso. Diga cá, meu companheiro, onde a história vai brotar? No campo seco e rachado ou no rio a beira-mar?`;

            displayCordel(text, promptForTTS, false).then(() => {
                const options = [
                    { text: "🌵 No *Sertão* rachado e poeirento", value: "sertao", callback: chooseSetting },
                    { text: "🌿 Na *Caatinga* de pedras e espinhos", value: "caatinga", callback: chooseSetting }
                ];
                renderOptions(options);
            });
        };

        // 2. CENÁRIO
        function chooseSetting(setting) {
            if (isProcessing) return;
            
            let text, promptForTTS, options;

            if (setting === 'sertao') {
                text = `
        "O Sertão foi escolhido, lugar de sol de rachar,
        João caminha na caieira, sem poder água encontrar.
        Quando o sol batia forte, na areia que fervia,
        Nosso herói viu algo estranho que o caminho lhe trazia.

        Um clarão lá na vereda, um mistério a reluzir,
        João sabia: era perigo, mas resolveu prosseguir.
        Era o BANDO DE LAMPIÃO, com rifles e com facão,
        Querendo fazer assalto pra tocar o terror no chão!
        
        E agora, o que faz João? Diante da dura afronta?
        Vai pro mato ou saca a arma? O que a sua alma conta?"
                `;
                promptForTTS = `O Sertão foi escolhido, lugar de sol de rachar. João caminha na caieira, sem poder água encontrar. Quando o sol batia forte, na areia que fervia, nosso herói viu algo estranho que o caminho lhe trazia. Um clarão lá na vereda, um mistério a reluzir, João sabia: era perigo, mas resolveu prosseguir. Era o BANDO DE LAMPIÃO, com rifles e com facão, querendo fazer assalto pra tocar o terror no chão! E agora, o que faz João? Diante da dura afronta? Vai pro mato ou saca a arma? O que a sua alma conta?`;
                options = [
                    { text: "🌿 *Se esconde* na moita e espera a noite", value: "esconder", callback: chooseAction },
                    { text: "⚔️ *Grita* e atira sua pedra no bandido", value: "atirar", callback: chooseAction }
                ];
            } else {
                text = `
        "Na Caatinga, o cenário de espinho e juazeiro,
        João seguia sua trilha, como um cabra verdadeiro.
        Ele busca um Mandacaru, pra beber água e viver,
        Quando um UIVO de assombro faz seu corpo estremecer.

        Na sombra de um Xique-Xique, surgiu a *Assombração*,
        Um vulto branco e gigante, a BIXA-SETE-CABEÇAS do sertão.
        O medo cortou o vento, paralisando o valente,
        Pois lutar com o invisível não é coisa pra toda gente.
        
        E agora, o que faz João? Diante da dura afronta?
        Vai pro mato ou saca a arma? O que a sua alma conta?"
                `;
                promptForTTS = `Na Caatinga, o cenário de espinho e juazeiro. João seguia sua trilha, como um cabra verdadeiro. Ele busca um Mandacaru, pra beber água e viver, quando um uivo de assombro faz seu corpo estremecer. Na sombra de um Xique-Xique, surgiu a Assombração, um vulto branco e gigante, a BIXA-SETE-CABEÇAS do sertão. O medo cortou o vento, paralisando o valente, pois lutar com o invisível não é coisa pra toda gente. E agora, o que faz João? Diante da dura afronta? Vai pro mato ou saca a arma? O que a sua alma conta?`;
                options = [
                    { text: "🗡️ *Saca o facão* e enfrenta o medo de frente", value: "lutar", callback: chooseAction },
                    { text: "💨 *Corre* sem olhar pra trás, na velocidade do vento", value: "correr", callback: chooseAction }
                ];
            }

            displayCordel(text, promptForTTS, false).then(() => renderOptions(options));
        }
