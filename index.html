<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cordel Interativo - Zé Violeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Special Elite', cursive;
            background: #1a0f0a;
            background-image: 
                radial-gradient(ellipse at 20% 50%, #3d251a 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, #3d251a 0%, transparent 60%),
                linear-gradient(180deg, #1a0f0a 0%, #2c1810 50%, #1a0f0a 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cordel-box {
            background: #f5e6c8;
            background-image: linear-gradient(180deg, #faf0dc 0%, #f5e6c8 50%, #ede0c8 100%);
            border: 12px solid #5c3d2e;
            border-image: repeating-linear-gradient(45deg, #5c3d2e 0px, #5c3d2e 8px, #7a5240 8px, #7a5240 16px) 12;
            box-shadow: 20px 20px 0 0 rgba(44, 24, 16, 0.7), inset 0 0 60px rgba(92, 61, 46, 0.15);
            border-radius: 2px;
            max-width: 1000px;
            width: 100%;
            position: relative;
            padding: 35px 45px;
            margin: 20px auto;
        }

        .cordel-box::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(139, 90, 43, 0.04) 3px, rgba(139, 90, 43, 0.04) 6px),
                repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(139, 90, 43, 0.02) 3px, rgba(139, 90, 43, 0.02) 6px);
            pointer-events: none;
            border-radius: 1px;
        }

        .cordel-box::after {
            content: '';
            position: absolute;
            top: -8px;
            left: 10%;
            right: 10%;
            height: 4px;
            background: repeating-linear-gradient(90deg, #8B7355 0px, #8B7355 10px, transparent 10px, transparent 20px);
            border-radius: 2px;
            opacity: 0.6;
        }

        .cordel-title {
            font-family: 'Special Elite', cursive;
            color: #2c1810;
            text-shadow: 3px 3px 0 rgba(139, 90, 43, 0.3), 5px 5px 0 rgba(139, 90, 43, 0.1);
            letter-spacing: 3px;
            border-bottom: 3px double #8B7355;
            padding-bottom: 18px;
            position: relative;
        }

        .cordel-title::before {
            content: '✦';
            position: absolute;
            left: -25px;
            top: 50%;
            transform: translateY(-50%);
            color: #8B7355;
            font-size: 1.5rem;
            opacity: 0.4;
        }

        .cordel-title::after {
            content: '✦';
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            color: #8B7355;
            font-size: 1.5rem;
            opacity: 0.4;
        }

        .cordel-text {
            font-family: 'Special Elite', cursive;
            color: #2c1810;
            line-height: 2.4;
            font-size: 1.15rem;
            white-space: pre-wrap;
            padding: 25px 20px;
            background: rgba(255, 248, 235, 0.6);
            border-left: 4px solid #8B7355;
            border-right: 4px solid #8B7355;
            border-radius: 8px;
            position: relative;
            min-height: 200px;
            margin: 20px 0;
            box-shadow: inset 0 0 30px rgba(139, 90, 43, 0.05);
        }

        .cordel-text::before {
            content: '❧';
            position: absolute;
            top: -12px;
            left: 15px;
            font-size: 1.8rem;
            color: #8B7355;
            opacity: 0.4;
            background: #f5e6c8;
            padding: 0 8px;
        }

        .cordel-text::after {
            content: '❧';
            position: absolute;
            bottom: -12px;
            right: 15px;
            font-size: 1.8rem;
            color: #8B7355;
            opacity: 0.4;
            transform: rotate(180deg);
            background: #f5e6c8;
            padding: 0 8px;
        }

        .cordel-text strong {
            color: #7a2e1a;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 1px 2px rgba(122, 46, 26, 0.2);
        }

        .action-button {
            font-family: 'Special Elite', cursive;
            background: #5c3d2e;
            color: #f5e6c8;
            border: 3px solid #3d251a;
            padding: 14px 20px;
            border-radius: 4px;
            transition: all 0.15s ease;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
            box-shadow: 5px 5px 0 0 #3d251a, inset 0 -4px 0 0 #3d251a;
            font-size: 1rem;
            letter-spacing: 0.5px;
            width: 100%;
            cursor: pointer;
            text-align: center;
            line-height: 1.4;
        }

        .action-button:hover:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0 0 #3d251a, inset 0 -4px 0 0 #3d251a;
            background: #7a5240;
        }

        .action-button:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 1px 1px 0 0 #3d251a, inset 0 -4px 0 0 #3d251a;
        }

        .action-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0 0 #3d251a;
        }

        .action-button.secondary {
            background: #8B7355;
            border-color: #5c3d2e;
            box-shadow: 5px 5px 0 0 #5c3d2e, inset 0 -4px 0 0 #5c3d2e;
            font-size: 1.1rem;
            padding: 16px 28px;
        }

        .action-button.secondary:hover:not(:disabled) {
            background: #a08464;
        }

        .action-button strong {
            color: #f5d742;
            font-weight: bold;
        }

        .xilogravura {
            font-size: 2.2rem;
            color: #5c3d2e;
            opacity: 0.25;
            letter-spacing: 12px;
            user-select: none;
            font-family: 'Special Elite', cursive;
        }

        .final-badge {
            display: inline-block;
            background: #5c3d2e;
            color: #f5d742;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-top: 12px;
            border: 2px solid #3d251a;
        }

        .story-path {
            display: inline-block;
            background: rgba(92, 61, 46, 0.1);
            color: #5c3d2e;
            padding: 4px 16px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-bottom: 10px;
            border: 1px dashed #8B7355;
        }

        @media (max-width: 768px) {
            .cordel-box { padding: 20px 18px; border-width: 8px; }
            .cordel-text { font-size: 0.95rem; line-height: 2; padding: 18px 12px; min-height: 150px; }
            .action-button { font-size: 0.85rem; padding: 10px 14px; }
            .cordel-title { font-size: 2rem !important; }
            .cordel-title::before, .cordel-title::after { display: none; }
            .xilogravura { font-size: 1.5rem; letter-spacing: 8px; }
        }

        @media (max-width: 480px) {
            .cordel-box { padding: 15px 12px; }
            .cordel-text { font-size: 0.85rem; line-height: 1.8; padding: 12px 8px; min-height: 120px; }
            .action-button { font-size: 0.8rem; padding: 8px 12px; box-shadow: 3px 3px 0 0 #3d251a; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div class="cordel-box">
        <div class="text-center mb-6">
            <div class="xilogravura">✦ ✦ ✦</div>
            <h1 class="cordel-title text-4xl md:text-5xl font-bold text-red-900 mt-2">
                O Cordel Interativo
            </h1>
            <p class="text-lg text-amber-900/80 mt-3 italic">
                Zé Violeiro convida: leia e decida o destino de João!
            </p>
            <div class="xilogravura mt-2">✦ ✦ ✦</div>
        </div>

        <div id="path-display" class="text-center text-sm text-amber-800/60 mb-2"></div>
        <div id="text-display" class="cordel-text"></div>

        <div id="interaction-area" class="flex flex-col items-center space-y-4">
            <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-3 w-full"></div>
            <button id="restart-button" class="hidden action-button secondary mt-4" onclick="iniciarHistoria()">
                ↺ Recomeçar a Jornada
            </button>
        </div>

        <div class="mt-8 pt-4 border-t-2 border-amber-800/30 text-center">
            <p class="text-sm text-amber-900/70">
                <span class="font-bold">Zé Violeiro:</span> Alto, magro, e com seu inseparável chapéu de palha.
            </p>
            <div class="xilogravura mt-1 text-xs">✧ ✧ ✧</div>
        </div>
    </div>

    <script>
        // ===== ELEMENTOS DOM =====
        const textDisplay = document.getElementById('text-display');
        const optionsContainer = document.getElementById('options-container');
        const restartButton = document.getElementById('restart-button');
        const pathDisplay = document.getElementById('path-display');
        let isProcessing = false;
        let caminho = [];

        // ===== FUNÇÃO PARA NEGRITO =====
        function formatText(text) {
            return text.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
        }

        // ===== EXIBIR TEXTO =====
        function displayCordel(text, mostrarReinicio = false, caminhoAtual = null) {
            if (isProcessing) return;
            isProcessing = true;

            if (caminhoAtual) {
                caminho.push(caminhoAtual);
                pathDisplay.textContent = '📜 ' + caminho.join(' → ');
            }

            textDisplay.classList.remove('fade-in');
            textDisplay.innerHTML = formatText(text);
            optionsContainer.innerHTML = '';
            restartButton.classList.add('hidden');
            
            void textDisplay.offsetWidth;
            textDisplay.classList.add('fade-in');

            if (mostrarReinicio) {
                setTimeout(() => {
                    restartButton.classList.remove('hidden');
                }, 400);
            }

            setTimeout(() => { isProcessing = false; }, 100);
        }

        // ===== RENDERIZAR BOTÕES =====
        function renderOptions(options) {
            optionsContainer.innerHTML = '';
            restartButton.classList.add('hidden');
            
            options.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerHTML = formatText(option.text);
                button.className = 'action-button fade-in';
                button.style.animationDelay = `${index * 0.1}s`;
                button.onclick = () => {
                    if (isProcessing) return;
                    Array.from(optionsContainer.querySelectorAll('button')).forEach(btn => btn.disabled = true);
                    option.callback(option.value);
                };
                optionsContainer.appendChild(button);
            });
        }

        // ============================================================
        // HISTÓRIA COMPLETA COM MUITAS OPÇÕES (12 FINAIS)
        // ============================================================

        // 1. INÍCIO - 3 cenários
        function iniciarHistoria() {
            caminho = [];
            pathDisplay.textContent = '';
            if (isProcessing) return;
            
            const texto = `
        "Sou eu, Zé Violeiro, cheguei pra prosear,
        Pego a viola afinada pra história começar.
        João é um cabra valente, que busca seu destino,
        Entre o *Sertão*, a *Caatinga* ou o *Litoral* fino.

        Onde será que nosso herói vai se aventurar?
        Me diga, companheiro, pra história continuar!"
            `;

            displayCordel(texto);
            
            const opcoes = [
                { text: "🏜️ *Sertão* - Terra de sol rachado", value: "sertao", callback: escolherCenario },
                { text: "🌵 *Caatinga* - Mata de espinhos secos", value: "caatinga", callback: escolherCenario },
                { text: "🌊 *Litoral* - Praias e mar azul", value: "litoral", callback: escolherCenario }
            ];
            
            setTimeout(() => renderOptions(opcoes), 100);
        }

        // 2. CENÁRIO - 3 ações cada (9 caminhos)
        function escolherCenario(cenario) {
            if (isProcessing) return;
            
            let texto, opcoes;

            if (cenario === 'sertao') {
                texto = `
        "No *Sertão* de rachar, João segue andando,
        O sol castiga forte, o chão vai queimando.
        De repente, avista uma *caravana* no caminho,
        E também uma *gruta* escura, um verdadeiro espinho.

        O que João vai fazer nessa hora?
        Seguir a caravana ou entrar na gruta?"
                `;
                opcoes = [
                    { text: "🐪 Seguir a *caravana* de comerciantes", value: "caravana", callback: escolherAcaoSertao },
                    { text: "🕯️ Entrar na *gruta* misteriosa", value: "gruta", callback: escolherAcaoSertao },
                    { text: "💧 Procurar *água* no meio do sertão", value: "agua", callback: escolherAcaoSertao }
                ];
            } else if (cenario === 'caatinga') {
                texto = `
        "Na *Caatinga* de espinhos, João segue em frente,
        O vento uiva forte, o chão está quente.
        Ele encontra uma *cabana* com uma velha rezadeira,
        E também uma *cobra* gigante na estrada traiçoeira.

        O que João vai fazer nessa hora?
        Entrar na cabana ou enfrentar a cobra?"
                `;
                opcoes = [
                    { text: "🏠 Entrar na *cabana* da rezadeira", value: "cabana", callback: escolherAcaoCaatinga },
                    { text: "🐍 Enfrentar a *cobra* gigante", value: "cobra", callback: escolherAcaoCaatinga },
                    { text: "🌿 Coletar *ervas medicinais* na mata", value: "ervas", callback: escolherAcaoCaatinga }
                ];
            } else {
                texto = `
        "No *Litoral* de areia branca e mar azul,
        João chegou cansado, mas com um sorriso no céu.
        Encontrou um *pescador* com um barco à vela,
        E uma *moça* bonita na beira da areia.

        O que João vai fazer nessa hora?
        Ir com o pescador ou ficar com a moça?"
                `;
                opcoes = [
                    { text: "⛵ Ir com o *pescador* para o alto-mar", value: "pescador", callback: escolherAcaoLitoral },
                    { text: "🏖️ Ficar com a *moça* na praia", value: "moca", callback: escolherAcaoLitoral },
                    { text: "🌴 Explorar a *mata* perto da praia", value: "mata", callback: escolherAcaoLitoral }
                ];
            }

            displayCordel(texto, false, cenario.charAt(0).toUpperCase() + cenario.slice(1));
            setTimeout(() => renderOptions(opcoes), 100);
        }

        // 3. AÇÕES SERTÃO - 4 finais diferentes
        function escolherAcaoSertao(acao) {
            if (isProcessing) return;
            
            let texto;

            switch (acao) {
                case 'caravana':
                    texto = `
        "João seguiu a caravana pelo sertão afora,
        Aprendeu a negociar, a vender e a comprar sem demora.
        Virou um *mercador* rico e respeitado,
        Mas nunca esqueceu do sertão que o viu nascer, coitado.

        Construiu uma escola e um poço na sua terra,
        E virou um *herói* do povo, acabando com a guerra.
        
        🏆 *FINAL DO MERCADOR*: João ficou rico e ajudou sua gente,
        E sua história no cordel é eterna e presente!"
                    `;
                    break;
                case 'gruta':
                    texto = `
        "João entrou na gruta escura, com medo e coragem,
        Encontrou um *tesouro* escondido, uma verdadeira bagagem.
        Mas a gruta era uma armadilha de um velho *feiticeiro*,
        Que o prendeu com magia, num destino traiçoeiro.

        João usou sua esperteza para enganar o feiticeiro,
        E saiu com o tesouro, mas ficou prisioneiro do dinheiro.
        
        🏆 *FINAL DO TESOURO*: João ficou rico, mas também ganancioso,
        E perdeu a simplicidade, se tornando orgulhoso!"
                    `;
                    break;
                case 'agua':
                    texto = `
        "João procurou água no sertão escaldante,
        Cavou e cavou, até encontrar um lençol d'água gigante.
        Não guardou só pra si, chamou a vizinhança,
        E ali nasceu uma *cidade*, com esperança e criança.

        Virou o *prefeito* do lugar, amado por todos,
        E viveu feliz, longe dos perigos e dos modos.
        
        🏆 *FINAL DA ÁGUA*: João fundou uma cidade próspera,
        E sua bondade virou lenda na história comprida!"
                    `;
                    break;
                default:
                    return;
            }

            displayCordel(texto, true, 'Sertão → ' + acao.charAt(0).toUpperCase() + acao.slice(1));
        }

        // 3. AÇÕES CAATINGA - 4 finais diferentes
        function escolherAcaoCaatinga(acao) {
            if (isProcessing) return;
            
            let texto;

            switch (acao) {
                case 'cabana':
                    texto = `
        "João entrou na cabana da velha rezadeira,
        Ela ensinou os segredos da mata, a cura verdadeira.
        João virou um *curandeiro* famoso na região,
        Curando os doentes com amor e com paixão.

        Mas a inveja dos outros curandeiros o perseguiu,
        E João teve que fugir, deixando tudo que construiu.
        
        🏆 *FINAL DO CURANDEIRO*: João virou um sábio andarilho,
        Curando por onde passava, um verdadeiro filho!"
                    `;
                    break;
                case 'cobra':
                    texto = `
        "João enfrentou a cobra gigante com seu facão,
        Lutou bravamente, com força e disposição.
        Matou a cobra, mas foi picado no pé,
        E quase morreu, mas sobreviveu com fé.

        Aprendizagem: nem sempre a *violência* é a solução,
        João ficou manco, mas ganhou uma lição.
        
        🏆 *FINAL DO GUERREIRO*: João venceu a cobra, mas ficou com a marca,
        E sua história serve de alerta pra qualquer um que embarca!"
                    `;
                    break;
                case 'ervas':
                    texto = `
        "João coletou ervas medicinais pela caatinga,
        Aprendeu com os pássaros e com a brisa que tinga.
        Criou uma *farmacinha* natural, ajudando os necessitados,
        E ficou conhecido como o *doutor* dos animais e dos coitados.

        Sua fama se espalhou pelo sertão inteiro,
        E ele viveu em paz, como um verdadeiro *mensageiro*.
        
        🏆 *FINAL DO SÁBIO*: João se tornou um mestre das ervas,
        E sua sabedoria é cantada em várias veras!"
                    `;
                    break;
                default:
                    return;
            }

            displayCordel(texto, true, 'Caatinga → ' + acao.charAt(0).toUpperCase() + acao.slice(1));
        }

        // 3. AÇÕES LITORAL - 4 finais diferentes
        function escolherAcaoLitoral(acao) {
            if (isProcessing) return;
            
            let texto;

            switch (acao) {
                case 'pescador':
                    texto = `
        "João foi com o pescador para o alto-mar,
        Enfrentaram tempestades, aprenderam a pescar.
        João virou um *pescador* experiente e valente,
        Mas sentia falta da terra, do sertão quente.

        Um dia, uma *sereia* o encantou com seu canto,
        E João ficou dividido entre o mar e o encanto.
        
        🏆 *FINAL DO PESCADOR*: João viveu entre o mar e a terra,
        Um homem de dois mundos, que a todos aterra!"
                    `;
                    break;
                case 'moca':
                    texto = `
        "João ficou com a moça na beira da praia,
        Ela era uma *princesa* disfarçada, uma grande preia.
        Casaram-se e viveram num castelo à beira-mar,
        João virou *rei* de uma terra, sem precisar lutar.

        Mas a vida de rei não era o que ele sonhou,
        E João percebeu que o *amor verdadeiro* o transformou.
        
        🏆 *FINAL DO REI*: João virou rei por amor,
        E governou com justiça, sem nenhum temor!"
                    `;
                    break;
                case 'mata':
                    texto = `
        "João explorou a mata perto da praia,
        Encontrou uma *tribo* indígena, uma grande gaiola.
        Aprendeu com eles a viver em harmonia,
        E descobriu que a *simplicidade* é a verdadeira poesia.

        Ficou com a tribo, virou um *guerreiro* da mata,
        Protegendo a natureza, com seu arco e sua prata.
        
        🏆 *FINAL DO GUERREIRO DA MATA*: João virou protetor da floresta,
        E sua lenda é cantada em cada festa!"
                    `;
                    break;
                default:
                    return;
            }

            displayCordel(texto, true, 'Litoral → ' + acao.charAt(0).toUpperCase() + acao.slice(1));
        }

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        window.onload = iniciarHistoria;
    </script>
</body>
</html>
