<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cordel Interativo - Zé Violeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Special Elite', cursive;
            background: #1a0f0a;
            background-image: 
                radial-gradient(ellipse at 20% 50%, #3d251a 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, #3d251a 0%, transparent 60%),
                linear-gradient(180deg, #1a0f0a 0%, #2c1810 50%, #1a0f0a 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cordel-box {
            background: #f5e6c8;
            background-image: linear-gradient(180deg, #faf0dc 0%, #f5e6c8 50%, #ede0c8 100%);
            border: 12px solid #5c3d2e;
            border-image: repeating-linear-gradient(45deg, #5c3d2e 0px, #5c3d2e 8px, #7a5240 8px, #7a5240 16px) 12;
            box-shadow: 20px 20px 0 0 rgba(44, 24, 16, 0.7), inset 0 0 60px rgba(92, 61, 46, 0.15);
            border-radius: 2px;
            max-width: 1000px;
            width: 100%;
            padding: 35px 45px;
            margin: 20px auto;
            position: relative;
        }

        .cordel-box::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(139, 90, 43, 0.04) 3px, rgba(139, 90, 43, 0.04) 6px),
                repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(139, 90, 43, 0.02) 3px, rgba(139, 90, 43, 0.02) 6px);
            pointer-events: none;
            border-radius: 1px;
        }

        .cordel-box::after {
            content: '';
            position: absolute;
            top: -8px;
            left: 10%;
            right: 10%;
            height: 4px;
            background: repeating-linear-gradient(90deg, #8B7355 0px, #8B7355 10px, transparent 10px, transparent 20px);
            border-radius: 2px;
            opacity: 0.6;
        }

        .cordel-title {
            font-family: 'Special Elite', cursive;
            color: #2c1810;
            text-shadow: 3px 3px 0 rgba(139, 90, 43, 0.3), 5px 5px 0 rgba(139, 90, 43, 0.1);
            letter-spacing: 3px;
            border-bottom: 3px double #8B7355;
            padding-bottom: 18px;
            position: relative;
        }

        .cordel-text {
            font-family: 'Special Elite', cursive;
            color: #2c1810;
            line-height: 2.4;
            font-size: 1.15rem;
            padding: 25px 20px;
            background: rgba(255, 248, 235, 0.6);
            border-left: 4px solid #8B7355;
            border-right: 4px solid #8B7355;
            border-radius: 8px;
            position: relative;
            min-height: 200px;
            margin: 20px 0;
            box-shadow: inset 0 0 30px rgba(139, 90, 43, 0.05);
        }

        .cordel-text p {
            margin: 0;
            padding: 0;
            text-align: left;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .cordel-text strong {
            color: #7a2e1a;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 1px 2px rgba(122, 46, 26, 0.2);
        }

        .action-button {
            font-family: 'Special Elite', cursive;
            background: #5c3d2e;
            color: #f5e6c8;
            border: 3px solid #3d251a;
            padding: 12px 16px;
            border-radius: 4px;
            transition: all 0.15s ease;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
            box-shadow: 5px 5px 0 0 #3d251a, inset 0 -4px 0 0 #3d251a;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            width: 100%;
            cursor: pointer;
            text-align: center;
            line-height: 1.3;
        }

        .action-button:hover:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0 0 #3d251a, inset 0 -4px 0 0 #3d251a;
            background: #7a5240;
        }

        .action-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0 0 #3d251a;
        }

        .action-button.secondary {
            background: #8B7355;
            border-color: #5c3d2e;
            box-shadow: 5px 5px 0 0 #5c3d2e, inset 0 -4px 0 0 #5c3d2e;
            font-size: 1.1rem;
            padding: 16px 28px;
            width: auto;
            min-width: 250px;
        }

        .action-button.secondary:hover:not(:disabled) {
            background: #a08464;
        }

        .action-button strong {
            color: #f5d742;
            font-weight: bold;
        }

        .xilogravura {
            font-size: 2.2rem;
            color: #5c3d2e;
            opacity: 0.25;
            letter-spacing: 12px;
            user-select: none;
        }

        .caminho {
            color: #8B7355;
            font-size: 0.85rem;
            text-align: center;
            margin: 5px 0 15px 0;
            padding: 8px;
            background: rgba(139, 90, 43, 0.08);
            border-radius: 20px;
            border: 1px dashed #8B7355;
        }

        .final-tag {
            display: inline-block;
            background: #5c3d2e;
            color: #f5d742;
            padding: 4px 18px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
            border: 2px solid #3d251a;
        }

        @media (max-width: 768px) {
            .cordel-box { padding: 20px 18px; border-width: 8px; }
            .cordel-text { font-size: 0.95rem; line-height: 2; padding: 18px 12px; min-height: 150px; }
            .action-button { font-size: 0.8rem; padding: 10px 12px; }
            .cordel-title { font-size: 2rem !important; }
            .xilogravura { font-size: 1.5rem; letter-spacing: 8px; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div class="cordel-box">
        <div class="text-center mb-6">
            <div class="xilogravura">✦ ✦ ✦</div>
            <h1 class="cordel-title text-4xl md:text-5xl font-bold text-red-900 mt-2">
                O Cordel Interativo
            </h1>
            <p class="text-lg text-amber-900/80 mt-3 italic">
                Zé Violeiro convida: leia e decida o destino de João!
            </p>
            <div class="xilogravura mt-2">✦ ✦ ✦</div>
        </div>

        <div id="caminho" class="caminho">🌵 Início da jornada</div>
        <div id="texto" class="cordel-text"></div>

        <div id="botoes" class="grid grid-cols-1 md:grid-cols-2 gap-3 w-full mt-4"></div>
        
        <div class="flex justify-center mt-6">
            <button id="reiniciar" class="action-button secondary hidden" onclick="inicio()">
                ↺ Recomeçar Jornada
            </button>
        </div>

        <div class="mt-8 pt-4 border-t-2 border-amber-800/30 text-center">
            <p class="text-sm text-amber-900/70">
                <span class="font-bold">Zé Violeiro:</span> Alto, magro, e com seu inseparável chapéu de palha.
            </p>
            <div class="xilogravura mt-1 text-xs">✧ ✧ ✧</div>
        </div>
    </div>

    <script>
        // ============================================================
        // SISTEMA DO CORDEL - VERSÃO COM MAIS OPÇÕES
        // ============================================================
        
        const textoEl = document.getElementById('texto');
        const botoesEl = document.getElementById('botoes');
        const reiniciarEl = document.getElementById('reiniciar');
        const caminhoEl = document.getElementById('caminho');
        let processando = false;
        let historico = [];

        function negrito(t) {
            return t.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
        }

        function exibir(texto, opcoes, final = false) {
            if (processando) return;
            processando = true;

            textoEl.classList.remove('fade-in');
            
            let textoLimpo = texto.trim();
            let linhas = textoLimpo.split('\n').map(linha => linha.trim());
            let textoFormatado = linhas.join('\n');
            textoFormatado = textoFormatado.replace(/\n/g, '<br>');
            textoFormatado = negrito(textoFormatado);
            
            textoEl.innerHTML = textoFormatado;
            botoesEl.innerHTML = '';
            reiniciarEl.classList.add('hidden');

            void textoEl.offsetWidth;
            textoEl.classList.add('fade-in');

            if (opcoes && opcoes.length > 0) {
                opcoes.forEach((op, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'action-button fade-in';
                    btn.innerHTML = negrito(op.texto);
                    btn.style.animationDelay = (i * 0.1) + 's';
                    btn.onclick = () => {
                        if (processando) return;
                        document.querySelectorAll('#botoes button').forEach(b => b.disabled = true);
                        op.acao(op.valor);
                    };
                    botoesEl.appendChild(btn);
                });
            }

            if (final) {
                setTimeout(() => {
                    reiniciarEl.classList.remove('hidden');
                }, 300);
            }

            setTimeout(() => { processando = false; }, 100);
        }

        function addCaminho(passo) {
            historico.push(passo);
            caminhoEl.textContent = '📜 ' + historico.join(' → ');
        }

        // ============================================================
        // HISTÓRIA COM 4 OPÇÕES EM CADA PASSO
        // ============================================================

        // PASSO 1: INÍCIO (4 opções)
        function inicio() {
            historico = [];
            caminhoEl.textContent = '🌵 Nova jornada começa';
            
            exibir(
                `"Sou Zé Violeiro, vim contar uma história,
                De João, um valente que busca sua glória.
                Ele partiu do sertão com seu facão na mão,
                Em busca de aventura, em busca de emoção.

                Quatro caminhos se abrem diante de João:
                O *Sertão* seco, a *Caatinga* espinhosa,
                O *Litoral* azul ou a *Serra* fria e frondosa.

                Escolha com cuidado, pois o destino é seu,
                E a história de João será o que você quiser!"`,
                [
                    { valor: 'sertao', texto: '🏜️ *Sertão* - Terra de sol e poeira', acao: passo2 },
                    { valor: 'caatinga', texto: '🌵 *Caatinga* - Mata de espinhos', acao: passo2 },
                    { valor: 'litoral', texto: '🌊 *Litoral* - Praias e mar azul', acao: passo2 },
                    { valor: 'serra', texto: '⛰️ *Serra* - Montanhas e neblina', acao: passo2 }
                ]
            );
        }

        // PASSO 2: CENÁRIOS (cada um com 4 opções)
        function passo2(valor) {
            const nomes = { 
                sertao: 'Sertão', 
                caatinga: 'Caatinga', 
                litoral: 'Litoral',
                serra: 'Serra'
            };
            addCaminho(nomes[valor]);

            if (valor === 'sertao') {
                exibir(
                    `"No *Sertão* o sol castiga, a terra é rachada,
                    João caminha cansado, a sede é chegada.
                    Quatro caminhos surgem diante de João:
                    Uma *caravana*, uma *gruta*, um *oásis* e um *viajante*.`,
                    [
                        { valor: 'caravana', texto: '🐪 Seguir a *caravana* de comerciantes', acao: passo3Sertao },
                        { valor: 'gruta', texto: '🕯️ Entrar na *gruta* misteriosa', acao: passo3Sertao },
                        { valor: 'oasis', texto: '💧 Buscar o *oásis* escondido', acao: passo3Sertao },
                        { valor: 'viajante', texto: '👤 Conversar com o *viajante* solitário', acao: passo3Sertao }
                    ]
                );
            } else if (valor === 'caatinga') {
                exibir(
                    `"Na *Caatinga* os espinhos ferem, o vento é cortante,
                    João encontra quatro caminhos interessantes:
                    Uma *cabana*, uma *cobra*, uma *flor* rara e um *rio* seco.`,
                    [
                        { valor: 'cabana', texto: '🏠 Entrar na *cabana* da rezadeira', acao: passo3Caatinga },
                        { valor: 'cobra', texto: '🐍 Enfrentar a *cobra* gigante', acao: passo3Caatinga },
                        { valor: 'flor', texto: '🌸 Buscar a *flor* que cura tudo', acao: passo3Caatinga },
                        { valor: 'rio', texto: '🌊 Seguir o *rio* seco', acao: passo3Caatinga }
                    ]
                );
            } else if (valor === 'litoral') {
                exibir(
                    `"No *Litoral* a brisa é suave, o mar é azul,
                    João encontra quatro caminhos legais:
                    Um *pescador*, uma *moça*, um *tesouro* e um *navio*.`,
                    [
                        { valor: 'pescador', texto: '⛵ Ir com o *pescador* para o mar', acao: passo3Litoral },
                        { valor: 'moca', texto: '🏖️ Ficar com a *moça* na praia', acao: passo3Litoral },
                        { valor: 'tesouro', texto: '💰 Procurar o *tesouro* enterrado', acao: passo3Litoral },
                        { valor: 'navio', texto: '🚢 Embarcar no *navio* negreiro', acao: passo3Litoral }
                    ]
                );
            } else {
                exibir(
                    `"Na *Serra* a neblina é densa, o frio é cortante,
                    João encontra quatro caminhos importantes:
                    Um *mosteiro*, uma *cachoeira*, uma *tribo* e uma *mina*.`,
                    [
                        { valor: 'mosteiro', texto: '⛪ Entrar no *mosteiro* antigo', acao: passo3Serra },
                        { valor: 'cachoeira', texto: '💦 Seguir a *cachoeira* gelada', acao: passo3Serra },
                        { valor: 'tribo', texto: '🏹 Visitar a *tribo* indígena', acao: passo3Serra },
                        { valor: 'mina', texto: '⛏️ Explorar a *mina* abandonada', acao: passo3Serra }
                    ]
                );
            }
        }

        // PASSO 3: FINAIS DO SERTÃO (4 finais)
        function passo3Sertao(valor) {
            const nomes = { 
                caravana: 'Caravana', 
                gruta: 'Gruta', 
                oasis: 'Oásis',
                viajante: 'Viajante'
            };
            addCaminho(nomes[valor]);

            if (valor === 'caravana') {
                exibir(
                    `"João seguiu a caravana pelo sertão afora,
                    Aprendeu a negociar, virou um grande *mercador*.
                    Ficou rico, mas ajudou sua gente querida,
                    Construiu escola, poço e trouxe nova vida.

                    🏆 *FINAL DO MERCADOR BONDOSO*
                    João se tornou o homem mais respeitado do sertão,
                    E sua história é cantada em toda a nação!"`,
                    [],
                    true
                );
            } else if (valor === 'gruta') {
                exibir(
                    `"João entrou na gruta escura e encontrou um tesouro,
                    Mas também um feitiço que o deixou com muito ouro.
                    A ganância tomou conta do seu coração,
                    E João perdeu a essência, virou um vilão.

                    🏆 *FINAL DO GANANCIOSO*
                    João ficou rico, mas perdeu a todos os amigos,
                    E viveu sozinho, cercado de inimigos!"`,
                    [],
                    true
                );
            } else if (valor === 'oasis') {
                exibir(
                    `"João encontrou o oásis escondido no sertão,
                    Água cristalina que deu vida à região.
                    Fundou uma cidade próspera e acolhedora,
                    E virou o líder da nova moradora.

                    🏆 *FINAL DO FUNDADOR*
                    João criou uma cidade no meio do sertão,
                    E seu nome virou sinônimo de união!"`,
                    [],
                    true
                );
            } else {
                exibir(
                    `"João conversou com o viajante solitário,
                    Que era na verdade um sábio visionário.
                    Ensinou a João os segredos da vida,
                    E João virou um poeta, com alma iluminada.

                    🏆 *FINAL DO POETA*
                    João virou um grande trovador do sertão,
                    E suas poesias ecoam pelo chão!"`,
                    [],
                    true
                );
            }
        }

        // PASSO 3: FINAIS DA CAATINGA (4 finais)
        function passo3Caatinga(valor) {
            const nomes = { 
                cabana: 'Cabana', 
                cobra: 'Cobra', 
                flor: 'Flor',
                rio: 'Rio'
            };
            addCaminho(nomes[valor]);

            if (valor === 'cabana') {
                exibir(
                    `"João entrou na cabana da velha rezadeira,
                    Aprendeu os segredos das ervas e poções.
                    Virou curandeiro famoso pela região,
                    Curando os doentes com sua sabedoria em ação.

                    🏆 *FINAL DO CURANDEIRO*
                    João virou o maior curandeiro da caatinga,
                    E sua fama atravessou até a beira da tinga!"`,
                    [],
                    true
                );
            } else if (valor === 'cobra') {
                exibir(
                    `"João enfrentou a cobra gigante com seu facão,
                    Uma luta brava que durou até o sol se pôr.
                    Matou a cobra, mas foi picado no calcanhar,
                    Sobreviveu e aprendeu que a violência não é o lar.

                    🏆 *FINAL DO GUERREIRO*
                    João ficou manco, mas virou uma lenda viva,
                    E sua história serve de alerta e de cativa!"`,
                    [],
                    true
                );
            } else if (valor === 'flor') {
                exibir(
                    `"João encontrou a flor que cura todos os males,
                    Uma planta rara que brilha como os cristais.
                    Levou a flor para o povo e curou a todos,
                    E virou um santo vivo, cheio de louvores.

                    🏆 *FINAL DO SANTO*
                    João virou protetor da caatinga inteira,
                    E sua memória é eterna, verdadeira e ligeira!"`,
                    [],
                    true
                );
            } else {
                exibir(
                    `"João seguiu o rio seco por dias e noites,
                    Encontrou uma cachoeira subterrânea de grande porte.
                    Descobriu água para todo o sertão sedento,
                    E salvou milhares com seu achado violento.

                    🏆 *FINAL DO SALVADOR*
                    João trouxe água para todo o sertão,
                    E seu nome virou sinônimo de salvação!"`,
                    [],
                    true
                );
            }
        }

        // PASSO 3: FINAIS DO LITORAL (4 finais)
        function passo3Litoral(valor) {
            const nomes = { 
                pescador: 'Pescador', 
                moca: 'Moça', 
                tesouro: 'Tesouro',
                navio: 'Navio'
            };
            addCaminho(nomes[valor]);

            if (valor === 'pescador') {
                exibir(
                    `"João foi com o pescador para o alto-mar,
                    Aprendeu as artes da pesca e do navegar.
                    Virou o melhor pescador da costa inteira,
                    Mas sempre sentiu falta da terra poeirenta.

                    🏆 *FINAL DO PESCADOR*
                    João viveu entre o mar e a terra, em paz,
                    E sua história é cantada pelos pescadores audazes!"`,
                    [],
                    true
                );
            } else if (valor === 'moca') {
                exibir(
                    `"João ficou com a moça na beira da praia,
                    Ela era uma princesa disfarçada em trajes de arraia.
                    Casou-se com ela e virou rei da região,
                    Um homem justo que governava com paixão.

                    🏆 *FINAL DO REI*
                    João virou o rei mais amado do litoral,
                    E seu reinado foi justo, bondoso e leal!"`,
                    [],
                    true
                );
            } else if (valor === 'tesouro') {
                exibir(
                    `"João encontrou um tesouro enterrado na areia,
                    Moedas de ouro e joias de grande valia.
                    Comprou um barco e virou um grande comerciante,
                    Mas a solidão o acompanhou por todo instante.

                    🏆 *FINAL DO RICO SOLITÁRIO*
                    João ficou muito rico, mas profundamente só,
                    E aprendeu que dinheiro não traz amor nem nó!"`,
                    [],
                    true
                );
            } else {
                exibir(
                    `"João embarcou no navio negreiro e foi viajar,
                    Conheceu terras distantes, culturas e mares.
                    Virou um explorador famoso no mundo inteiro,
                    E escreveu livros sobre seu roteiro.

                    🏆 *FINAL DO EXPLORADOR*
                    João viajou o mundo todo e conheceu,
                    Mas no fim, o sertão foi o lugar que ele mais amou!"`,
                    [],
                    true
                );
            }
        }

        // PASSO 3: FINAIS DA SERRA (4 finais)
        function passo3Serra(valor) {
            const nomes = { 
                mosteiro: 'Mosteiro', 
                cachoeira: 'Cachoeira', 
                tribo: 'Tribo',
                mina: 'Mina'
            };
            addCaminho(nomes[valor]);

            if (valor === 'mosteiro') {
                exibir(
                    `"João entrou no mosteiro antigo e silencioso,
                    Encontrou monges sábios, um lugar glorioso.
                    Virou um monge estudioso e aprendizado,
                    E descobriu o sentido da vida, em paz de verdade.

                    🏆 *FINAL DO MONGE*
                    João virou um grande mestre espiritual,
                    E sua sabedoria ecoa por todo o local!"`,
                    [],
                    true
                );
            } else if (valor === 'cachoeira') {
                exibir(
                    `"João seguiu a cachoeira gelada e cristalina,
                    Encontrou pedras preciosas de grande estima.
                    Virou um garimpeiro próspero e viajante,
                    Mas a simplicidade do sertão ficou distante.

                    🏆 *FINAL DO GARIMPEIRO*
                    João ficou rico com as pedras da serra,
                    Mas nunca mais encontrou a paz da sua terra!"`,
                    [],
                    true
                );
            } else if (valor === 'tribo') {
                exibir(
                    `"João visitou a tribo indígena na serra,
                    Aprendeu seus costumes, sua dança e guerra.
                    Virou um guerreiro respeitado na aldeia,
                    E protegeu a floresta com sua lança e ideia.

                    🏆 *FINAL DO GUERREIRO INDÍGENA*
                    João virou protetor da mata e da serra,
                    E viveu em harmonia com a natureza terra!"`,
                    [],
                    true
                );
            } else {
                exibir(
                    `"João explorou a mina abandonada na serra,
                    Encontrou cristais que brilham como a terra.
                    Virou um minerador famoso e respeitado,
                    Mas perdeu a saúde em busca do ouro brilhado.

                    🏆 *FINAL DO MINERADOR*
                    João enriqueceu com os cristais da mina,
                    Mas a saúde perdeu pela longa jornada!"`,
                    [],
                    true
                );
            }
        }

        window.onload = inicio;
